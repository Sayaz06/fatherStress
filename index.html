<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Original Wan-Law</title>
  <meta name="theme-color" content="#020617" />
  <link rel="manifest" href="manifest.webmanifest" />

  <style>
    :root{
      --bg:#020617; --text:#e5e7eb; --muted:#9ca3af;
      --border:#1f2937; --border2:#4b5563;
      --grad1:#6366f1; --grad2:#8b5cf6;
    }
    *{box-sizing:border-box}
    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family:system-ui, -apple-system, sans-serif;
    }
    .container{max-width:900px; margin:0 auto; padding:20px}
    .card{
      background:#0b1220; border:1px solid var(--border);
      border-radius:16px; padding:16px; box-shadow:0 10px 25px rgba(0,0,0,.35);
    }
    /* TAJUK UTAMA: Boleh wrap ke bawah */
    .title{
      font-weight:700; font-size:24px; margin:8px 0 16px;
      word-wrap: break-word; white-space: normal; line-height: 1.3;
    }
    .row{display:flex; gap:12px; flex-wrap:wrap; align-items:center}
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      padding:10px 14px; border-radius:12px; color:white; border:1px solid transparent;
      background:linear-gradient(135deg, var(--grad1), var(--grad2));
      cursor:pointer; transition:.15s;
    }
    .btn-ghost{background:transparent; border:1px solid var(--border2); color:var(--text)}
    .btn-danger{background:#7c2d12; border:none}
    
    .input, .item-textarea {
      width:100%; padding:10px 12px; border-radius:12px;
      background:#0b1220; border:1px solid var(--border2);
      color:var(--text); outline:none; font-family: inherit;
    }

    .list{display:flex; flex-direction:column; gap:10px; margin-top:12px}
    .item{
      display:flex; flex-direction: column; /* Ubah ke column supaya tajuk panjang ada ruang */
      padding:12px; border-radius:12px; border:1px solid var(--border);
      background:#0e1626; gap:10px;
    }
    
    /* Ruang input tajuk dalam list */
    .item-textarea {
      background: transparent; border: 1px solid transparent;
      resize: none; overflow: hidden; font-size: 16px; padding: 5px;
    }
    .item-textarea:focus { border-color: var(--grad1); background: #020617; }

    .toolbar{
      display:flex; gap:8px; flex-wrap:wrap; padding:8px; border:1px solid var(--border);
      border-radius:12px; margin:10px 0; background:#0e1626;
    }
    .editor{
      min-height:300px; padding:15px; border-radius:12px;
      border:1px solid var(--border); background:#0b1220; outline:none; line-height: 1.6;
    }
    .subtext{color:var(--muted); font-size:12px}
    .hidden{display:none !important}

    /* HISTORY STYLES */
    .history-section { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px; }
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      background: #111827; padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 13px;
    }
  </style>

  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <div class="container">
    <section id="view-login" class="card">
      <div class="title">Original Wan-Law</div>
      <button id="btn-google" class="btn">Log masuk dengan Google</button>
    </section>

    <section id="view-home" class="card hidden">
      <div class="row" style="justify-content: space-between;">
        <div class="title">Fail Utama</div>
        <button id="btn-logout" class="btn-ghost">Logout</button>
      </div>
      <div class="row">
        <input id="search-files" class="input" style="flex:1" placeholder="Cari Fail..." />
        <button id="btn-add-file" class="btn">Tambah Fail</button>
      </div>
      <div id="files-list" class="list"></div>
    </section>

    <section id="view-folders" class="card hidden">
      <div class="row">
        <button id="btn-back-home" class="btn-ghost">← Kembali</button>
      </div>
      <div class="title" id="current-file-name">Nama Fail</div>
      <div class="row">
        <input id="search-folders" class="input" style="flex:1" placeholder="Cari Folder..." />
        <button id="btn-add-folder" class="btn">Tambah Folder</button>
      </div>
      <div id="folders-list" class="list"></div>
    </section>

    <section id="view-note" class="card hidden">
      <div class="row">
        <button id="btn-back-folders" class="btn-ghost">← Kembali</button>
      </div>
      <div class="title" id="current-folder-name">Nama Folder</div>
      
      <div class="toolbar">
        <button class="btn" data-action="bold">B</button>
        <button class="btn" data-action="underline">U</button>
        <input id="color-picker" type="color" />
        <button id="btn-size-down" class="btn">−</button>
        <button id="btn-size-up" class="btn">+</button>
        <button id="btn-export-json" class="btn">Export</button>
      </div>

      <div id="editor" class="editor" contenteditable="true" spellcheck="false"></div>
      <p id="save-status" class="subtext">Auto-simpan aktif.</p>

      <div class="history-section">
        <p><strong>Sejarah (History):</strong></p>
        <div id="history-list"></div>
      </div>
    </section>
  </div>
</body>
</html>
