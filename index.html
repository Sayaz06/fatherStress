<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wan-Law x First-Life Hybrid</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #020617;
      --border: #1f2937;
      --grad1: #6366f1;
      --grad2: #8b5cf6;
    }
    body { background-color: var(--bg); color: #e5e7eb; }
    .editor {
      min-height: 400px;
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      outline: none;
      color: white;
    }
    .hidden { display: none !important; }
  </style>

  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body class="min-h-screen">

  <header class="flex items-center justify-between px-4 py-3 border-b border-slate-800 bg-slate-900/50 sticky top-0 z-50">
    <h1 class="text-xl font-bold tracking-tighter text-indigo-400">Wan-Law <span class="text-white">Hybrid</span></h1>
    <button id="btnLogout" class="hidden px-3 py-1 rounded bg-slate-800 hover:bg-red-900 text-sm transition">Logout</button>
  </header>

  <main class="max-w-4xl mx-auto p-4">

    <section id="view-login" class="mt-20 flex justify-center">
      <div class="max-w-md w-full bg-slate-800/50 rounded-2xl p-8 border border-slate-700 shadow-2xl text-center">
        <h2 class="text-2xl font-bold mb-4">Selamat Datang</h2>
        <p class="text-slate-400 mb-6">Sistem nota hibrid dengan simpanan awan Firebase.</p>
        <button id="btnGoogle" class="w-full py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-bold transition">
          Log masuk dengan Google
        </button>
      </div>
    </section>

    <section id="view-subjects" class="hidden">
      <div class="flex gap-2 mb-6">
        <input id="searchSubjects" type="text" placeholder="Cari subjek..." class="flex-1 px-4 py-2 rounded-xl bg-slate-800 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        <button id="btnAddSubject" class="px-4 py-2 rounded-xl bg-indigo-600 font-bold">Tambah</button>
      </div>
      <div id="listSubjects" class="grid gap-3"></div>
    </section>

    <section id="view-topics" class="hidden">
      <div class="flex items-center justify-between mb-4">
        <button onclick="showView('subjects')" class="text-sm text-slate-400 hover:text-white">← Kembali</button>
        <h3 id="labelSubject" class="font-bold text-indigo-400"></h3>
      </div>
      <div class="flex gap-2 mb-6">
        <input id="searchTopics" type="text" placeholder="Cari topik..." class="flex-1 px-4 py-2 rounded-xl bg-slate-800 border border-slate-700 focus:outline-none" />
        <button id="btnAddTopic" class="px-4 py-2 rounded-xl bg-indigo-600 font-bold">Tambah Topik</button>
      </div>
      <div id="listTopics" class="grid gap-3"></div>
    </section>

    <section id="view-editor" class="hidden">
      <div class="flex items-center justify-between mb-4">
        <button id="btnBackToTopics" class="px-4 py-1 rounded bg-slate-800 text-sm">← Simpan & Kembali</button>
        <div class="text-right">
          <h3 id="labelTopic" class="font-bold text-indigo-400"></h3>
          <p id="saveStatus" class="text-[10px] text-slate-500">Auto-simpan aktif</p>
        </div>
      </div>

      <div class="flex flex-wrap gap-2 p-2 mb-2 bg-slate-800 rounded-t-xl border-x border-t border-slate-700">
        <button class="px-3 py-1 bg-slate-700 rounded hover:bg-slate-600 text-xs font-bold" onclick="doCmd('bold')">B</button>
        <button class="px-3 py-1 bg-slate-700 rounded hover:bg-slate-600 text-xs underline font-bold" onclick="doCmd('underline')">U</button>
        <input type="color" id="colorPicker" class="h-6 w-8 bg-transparent border-none cursor-pointer" oninput="doCmd('foreColor', this.value)" />
        <button class="px-3 py-1 bg-slate-700 rounded hover:bg-slate-600 text-xs" onclick="adjustSize(2)">A+</button>
        <button class="px-3 py-1 bg-slate-700 rounded hover:bg-slate-600 text-xs" onclick="adjustSize(-2)">A-</button>
        <div class="flex-1 text-right">
            <button id="btnExport" class="px-3 py-1 bg-indigo-900/50 text-[10px] rounded">JSON Export</button>
        </div>
      </div>

      <div id="editor" class="editor" contenteditable="true" spellcheck="false"></div>
    </section>

  </main>

  <script>
    // ================== CONFIG FIREBASE (App 1) ==================
    const firebaseConfig = {
      apiKey: "AIzaSyCtxOE42D07yFc9eK3nLMsOy50SmeSErwI",
      authDomain: "fatherstress-9e695.firebaseapp.com",
      projectId: "fatherstress-9e695",
      storageBucket: "fatherstress-9e695.firebasestorage.app",
      messagingSenderId: "147729735248",
      appId: "1:147729735248:web:f6771fee76727436a0fb55"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let state = {
      uid: null,
      currentSubjId: null,
      currentTopicId: null,
      saveTimer: null
    };

    // ================== NAVIGATION ==================
    function showView(id) {
      document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
      document.getElementById('view-' + id).classList.remove('hidden');
    }

    auth.onAuthStateChanged(user => {
      if (user) {
        state.uid = user.uid;
        document.getElementById('btnLogout').classList.remove('hidden');
        showView('subjects');
        loadSubjects();
      } else {
        showView('login');
        document.getElementById('btnLogout').classList.add('hidden');
      }
    });

    document.getElementById('btnGoogle').onclick = () => {
      auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    };
    document.getElementById('btnLogout').onclick = () => auth.signOut();

    // ================== LOGIK DATA (Subjek -> Topik) ==================
    function usersCol() { return db.collection('users').doc(state.uid); }

    async function loadSubjects() {
      const snap = await usersCol().collection('subjects').orderBy('name').get();
      const list = document.getElementById('listSubjects');
      list.innerHTML = '';
      snap.forEach(doc => {
        const d = doc.data();
        const div = document.createElement('div');
        div.className = "bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-center";
        div.innerHTML = `
          <button class="font-bold flex-1 text-left">${d.name}</button>
          <button class="text-xs text-red-500 ml-4 delete-btn">Padam</button>
        `;
        div.querySelector('button').onclick = () => openSubject(doc.id, d.name);
        div.querySelector('.delete-btn').onclick = () => deleteItem('subjects', doc.id, loadSubjects);
        list.appendChild(div);
      });
    }

    async function openSubject(id, name) {
      state.currentSubjId = id;
      document.getElementById('labelSubject').textContent = name;
      showView('topics');
      loadTopics();
    }

    async function loadTopics() {
      const snap = await usersCol().collection('subjects').doc(state.currentSubjId).collection('topics').orderBy('name').get();
      const list = document.getElementById('listTopics');
      list.innerHTML = '';
      snap.forEach(doc => {
        const d = doc.data();
        const div = document.createElement('div');
        div.className = "bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-center shadow-lg";
        div.innerHTML = `
          <div class="flex-1">
            <div class="font-bold text-white">${d.name}</div>
            <div class="text-[10px] text-slate-500">Klik "Buka Editor" untuk mula menulis</div>
          </div>
          <button class="bg-indigo-600 px-3 py-2 rounded-lg text-xs font-bold mr-2">Buka Editor</button>
          <button class="text-xs text-red-500 delete-btn">🗑️</button>
        `;
        div.querySelector('button').onclick = () => openEditor(doc.id, d.name);
        div.querySelector('.delete-btn').onclick = () => deleteItem(`subjects/${state.currentSubjId}/topics`, doc.id, loadTopics);
        list.appendChild(div);
      });
    }

    // ================== LOGIK EDITOR (Fungsi App 1) ==================
    async function openEditor(id, name) {
      state.currentTopicId = id;
      document.getElementById('labelTopic').textContent = name;
      document.getElementById('editor').innerHTML = 'Memuatkan...';
      showView('editor');

      const doc = await usersCol().collection('subjects').doc(state.currentSubjId).collection('topics').doc(id).get();
      document.getElementById('editor').innerHTML = doc.data().content || '';
    }

    // Editor Commands
    function doCmd(cmd, val = null) {
      document.execCommand(cmd, false, val);
      document.getElementById('editor').focus();
    }

    function adjustSize(delta) {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      const node = sel.anchorNode.parentElement;
      const currentSize = parseFloat(window.getComputedStyle(node).fontSize) || 16;
      node.style.fontSize = (currentSize + delta) + 'px';
    }

    // Auto-Save (5 saat debounced - App 1)
    const editorEl = document.getElementById('editor');
    editorEl.addEventListener('input', () => {
      document.getElementById('saveStatus').textContent = 'Menulis...';
      clearTimeout(state.saveTimer);
      state.saveTimer = setTimeout(saveData, 5000);
    });

    async function saveData() {
      if (!state.currentTopicId) return;
      try {
        await usersCol().collection('subjects').doc(state.currentSubjId).collection('topics').doc(state.currentTopicId).set({
          content: editorEl.innerHTML,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        document.getElementById('saveStatus').textContent = 'Tersimpan (Cloud)';
      } catch (e) {
        document.getElementById('saveStatus').textContent = 'Offline - Gagal Simpan';
      }
    }

    // Navigasi Kembali & Simpan
    document.getElementById('btnBackToTopics').onclick = async () => {
      await saveData();
      showView('topics');
    };

    // Tambah Data Baru
    document.getElementById('btnAddSubject').onclick = async () => {
      const name = prompt('Nama Subjek?');
      if (name) {
        await usersCol().collection('subjects').add({ name, createdAt: Date.now() });
        loadSubjects();
      }
    };

    document.getElementById('btnAddTopic').onclick = async () => {
      const name = prompt('Nama Topik?');
      if (name) {
        await usersCol().collection('subjects').doc(state.currentSubjId).collection('topics').add({ 
          name, 
          content: '',
          createdAt: Date.now() 
        });
        loadTopics();
      }
    };

    async function deleteItem(path, id, callback) {
      if(confirm('Padam data ini?')) {
        await usersCol().collection(path).doc(id).delete();
        callback();
      }
    }

    // Export JSON
    document.getElementById('btnExport').onclick = () => {
      const data = {
        title: document.getElementById('labelTopic').textContent,
        content: editorEl.innerHTML
      };
      const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `nota-${state.currentTopicId}.json`;
      a.click();
    };

  </script>
</body>
</html>
