<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Original Wan-Law</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            slate: { 900: '#020617', 800: '#0b1220', 700: '#1f2937' }
          }
        }
      }
    }
  </script>

  <style>
    /* Custom scrollbar untuk nampak kemas */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }
    
    .editor-container [contenteditable]:empty:before {
      content: attr(placeholder);
      color: #9ca3af;
      cursor: text;
    }
  </style>

  <meta name="theme-color" content="#020617" />
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 font-sans">

  <header class="sticky top-0 z-50 flex items-center justify-between px-6 py-4 bg-slate-900/80 backdrop-blur-md border-b border-slate-800">
    <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-indigo-400 to-violet-400 bg-clip-text text-transparent">
      Original Wan-Law
    </h1>
    <button id="btn-logout" class="hidden px-3 py-1.5 text-xs font-medium rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 transition-all">
      Log keluar
    </button>
  </header>

  <main class="max-w-4xl mx-auto p-4 md:p-6">

    <section id="view-login" class="mt-20 flex flex-col items-center justify-center">
      <div class="w-full max-w-md p-8 rounded-2xl bg-slate-800/50 border border-slate-700 shadow-2xl">
        <h2 class="text-2xl font-bold mb-2">Selamat Datang</h2>
        <p class="text-slate-400 mb-8 text-sm">Simpan nota skrip dan undang-undang anda dengan selamat di awan.</p>
        <button id="btn-google" class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 font-bold shadow-lg shadow-indigo-500/20 transition-all">
          Masuk dengan Google
        </button>
      </div>
    </section>

    <section id="view-home" class="hidden space-y-6">
      <div class="flex flex-col sm:flex-row gap-3">
        <input id="search-files" type="text" placeholder="Cari fail..." class="flex-1 px-4 py-2.5 rounded-xl bg-slate-800 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500/50" />
        <button id="btn-add-file" class="px-5 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-bold transition-all">
          + Fail Baharu
        </button>
      </div>
      <div id="files-list" class="grid gap-3"></div>
    </section>

    <section id="view-folders" class="hidden space-y-6">
      <div class="flex items-center justify-between gap-4">
        <button id="btn-back-home" class="px-3 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 text-sm border border-slate-700">← Kembali</button>
        <h2 id="current-file-name" class="flex-1 text-right font-bold text-indigo-400 truncate"></h2>
      </div>
      <div class="flex flex-col sm:flex-row gap-3">
        <input id="search-folders" type="text" placeholder="Cari folder..." class="flex-1 px-4 py-2.5 rounded-xl bg-slate-800 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500/50" />
        <button id="btn-add-folder" class="px-5 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-bold">
          + Folder Baharu
        </button>
      </div>
      <div id="folders-list" class="grid gap-3"></div>
    </section>

    <section id="view-note" class="hidden space-y-4">
      <div class="flex items-center justify-between gap-4 sticky top-[73px] bg-slate-900/95 py-2 z-40">
        <button id="btn-back-folders" class="px-3 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 text-sm border border-slate-700">← Kembali</button>
        <h2 id="current-folder-name" class="flex-1 text-right font-bold text-violet-400 truncate"></h2>
      </div>

      <div class="flex flex-wrap items-center gap-2 p-2 bg-slate-800/80 rounded-xl border border-slate-700 shadow-inner">
        <button data-action="bold" class="p-2 w-10 h-10 rounded-lg hover:bg-slate-700 font-bold">B</button>
        <button data-action="underline" class="p-2 w-10 h-10 rounded-lg hover:bg-slate-700 underline">U</button>
        <input id="color-picker" type="color" class="w-8 h-8 bg-transparent border-none cursor-pointer" />
        <div class="h-6 w-px bg-slate-700 mx-1"></div>
        <button id="btn-size-down" class="p-2 w-10 h-10 rounded-lg hover:bg-slate-700">−</button>
        <button id="btn-size-up" class="p-2 w-10 h-10 rounded-lg hover:bg-slate-700">+</button>
        <div class="flex-1"></div>
        <button id="btn-export-json" class="px-3 py-1.5 text-xs rounded-lg bg-slate-700 hover:bg-slate-600">Export JSON</button>
      </div>

      <div id="editor" class="editor-container min-h-[400px] p-6 rounded-2xl bg-slate-800/30 border border-slate-700 focus:outline-none focus:ring-1 focus:ring-slate-600 text-lg leading-relaxed shadow-inner" contenteditable="true" placeholder="Mula menulis nota anda di sini..."></div>
      
      <div class="flex justify-between items-center px-2">
        <p id="save-status" class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Auto-simpan aktif</p>
      </div>

      <div class="mt-12 p-5 rounded-2xl bg-slate-800/20 border border-slate-800">
        <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Sejarah Versi (5 Terakhir)</h3>
        <div id="history-list" class="space-y-2">
           <p class="text-xs text-slate-600 italic">Tiada sejarah tersedia.</p>
        </div>
      </div>
    </section>

  </main>

  <footer class="mt-20 py-10 text-center border-t border-slate-800/50">
    <p class="text-xs text-slate-600 uppercase tracking-widest">Original Wan-Law &copy; 2026</p>
  </footer>

  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script defer src="app.js"></script>
</body>
</html>
