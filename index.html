<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Original Wan-Law</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { slate: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' } } } }
    }
  </script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .editor-container [contenteditable]:empty:before { content: attr(placeholder); color: #475569; }
    .title-textarea {
      background: transparent !important; border: none !important; outline: none !important;
      resize: none !important; width: 100%; color: #60a5fa; font-weight: 700;
      font-size: 1.25rem; line-height: 1.4; padding: 0; margin: 0; overflow: hidden;
    }
    .clean-card {
      width: 100%; background: rgba(30, 41, 59, 0.4); padding: 1.5rem;
      border-radius: 1.25rem; border: 1px solid #1e293b; margin-bottom: 1rem;
    }
  </style>
</head>
<body class="min-h-screen bg-[#0f172a] text-slate-200">
  <header class="flex items-center justify-between px-6 py-4 border-b border-slate-800 bg-[#0f172a]/95 sticky top-0 z-50">
    <h1 class="text-xl font-bold text-white">Original Wan-Law</h1>
    <button id="btn-logout" class="hidden px-4 py-1.5 rounded-xl bg-slate-800 text-xs font-bold border border-slate-700">LOG KELUAR</button>
  </header>

  <main class="max-w-4xl mx-auto p-4 md:p-6">
    <section id="view-login" class="mt-20 flex justify-center">
      <div class="w-full max-w-md bg-slate-800/30 p-8 rounded-3xl border border-slate-800 text-center shadow-2xl">
        <h2 class="text-2xl font-bold text-white mb-2">Masuk Akaun</h2>
        <button id="btn-google" class="w-full py-4 mt-6 rounded-2xl bg-indigo-600 hover:bg-indigo-500 font-bold shadow-lg">Masuk dengan Google</button>
      </div>
    </section>

    <section id="view-home" class="hidden space-y-6">
      <div class="flex gap-2 bg-slate-900/50 p-2 rounded-2xl border border-slate-800">
        <input id="search-files" type="text" placeholder="Cari fail..." class="flex-1 px-4 py-2 bg-transparent outline-none" />
        <button id="btn-add-file" class="px-6 py-2 rounded-xl bg-indigo-600 font-bold text-xs">+ FAIL</button>
      </div>
      <div id="files-list"></div>
    </section>

    <section id="view-folders" class="hidden space-y-6">
      <div class="flex items-center justify-between gap-4">
        <button id="btn-back-home" class="px-4 py-2 rounded-xl bg-slate-800 text-xs font-bold border border-slate-700">← KEMBALI</button>
        <h2 id="current-file-name" class="flex-1 text-right font-bold text-blue-400 truncate text-sm uppercase"></h2>
      </div>
      <div class="flex gap-2 bg-slate-900/50 p-2 rounded-2xl border border-slate-800">
        <input id="search-folders" type="text" placeholder="Cari folder..." class="flex-1 px-4 py-2 bg-transparent outline-none" />
        <button id="btn-add-folder" class="px-6 py-2 rounded-xl bg-indigo-600 font-bold text-xs">+ FOLDER</button>
      </div>
      <div id="folders-list"></div>
    </section>

    <section id="view-note" class="hidden space-y-4">
      <div class="flex items-center justify-between gap-4 sticky top-[73px] bg-[#0f172a] py-2 z-40">
        <button id="btn-back-folders" class="px-4 py-2 rounded-xl bg-slate-800 text-xs font-bold border border-slate-700">← KEMBALI</button>
        <h2 id="current-folder-name" class="flex-1 text-right font-bold text-blue-400 truncate text-sm uppercase"></h2>
      </div>
      <div class="flex flex-wrap items-center gap-1 p-2 bg-slate-800/40 rounded-2xl border border-slate-800">
        <button data-action="bold" class="w-10 h-10 font-bold">B</button>
        <button data-action="underline" class="w-10 h-10 underline">U</button>
        <input id="color-picker" type="color" class="w-8 h-8 bg-transparent cursor-pointer mx-2" />
        <button id="btn-size-down" class="w-10 h-10 text-lg">−</button>
        <button id="btn-size-up" class="w-10 h-10 text-lg">+</button>
      </div>
      <div id="editor" class="editor-container min-h-[500px] p-8 rounded-3xl bg-slate-800/10 border border-slate-800 focus:outline-none text-lg" contenteditable="true" placeholder="Tulis sesuatu..."></div>
      <p id="save-status" class="text-[10px] uppercase text-slate-500 font-bold text-center mt-4 tracking-widest">Auto-simpan Aktif</p>
      <div class="mt-12 p-6 rounded-3xl bg-slate-800/10 border border-slate-800">
        <h3 class="text-[10px] font-bold text-slate-500 uppercase mb-6 tracking-widest">Sejarah Versi (Mengikut Sela Masa)</h3>
        <div id="history-list" class="space-y-3"></div>
      </div>
    </section>
  </main>

  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script defer src="app.js"></script>
</body>
</html>
