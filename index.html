<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Wan-Law v6.2 Pro</title>
  <link rel="manifest" href="manifest.webmanifest">
  
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icons-192-v2.png">
  <link rel="apple-touch-icon" href="icons/icons-192-v2.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    :root { --bg: #020617; }
    body { background-color: var(--bg); color: #e5e7eb; font-family: system-ui, sans-serif; overflow-x: hidden; }
    .editor {
      min-height: 500px; background: #0b1220; border: 1px solid #1f2937;
      border-radius: 0 0 12px 12px; padding: 16px; outline: none; color: white;
      font-size: 16px; line-height: 1.6; word-break: break-word;
    }
    .hidden { display: none !important; }
    .break-text { word-break: break-word; overflow-wrap: break-word; white-space: normal; }
    
    /* Animasi Progress Bar Flow */
    .progress-flow {
      width: 0%; height: 100%;
      background: linear-gradient(90deg, #6366f1, #a855f7, #6366f1);
      background-size: 200% 100%;
      animation: flow 1.5s linear infinite;
      transition: width 0.3s ease;
    }
    @keyframes flow { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Gaya Tambahan Untuk Jadual (Table) Dalam Editor */
    .editor table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      margin-bottom: 10px;
    }
    .editor th, .editor td {
      border: 1px solid #475569;
      padding: 8px;
      min-width: 50px;
    }

    /* --- GAYA BAHARU DITAMBAH (INJECTED) --- */
    .last-read-mark { 
      background-color: #fef08a; 
      color: #1e293b; 
      border-radius: 4px; 
      padding: 2px 4px; 
      box-shadow: 0 0 5px rgba(254, 240, 138, 0.4); 
    }
    .has-translate { 
      border-bottom: 2px dashed #a855f7; 
      cursor: pointer; 
      color: #c084fc; 
      transition: color 0.2s; 
    }
    .floating-flip { 
      position: fixed; 
      right: 16px; 
      top: 35%; /* Kedudukan penjuru kanan tengah sedikit atas */
      z-index: 60; 
      width: 46px; 
      height: 46px; 
      border-radius: 50%; 
      background-color: #4f46e5; 
      color: white; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
      font-size: 20px; 
      cursor: pointer; 
      transition: transform 0.2s, background-color 0.2s; 
      border: 2px solid #818cf8; 
    }
    .floating-flip:active { 
      transform: scale(0.9); 
      background-color: #4338ca; 
    }
  </style>
</head>
<body class="min-h-screen w-full">

  <header class="w-full flex items-center justify-between px-4 py-3 border-b border-slate-800 bg-slate-900/80 sticky top-0 z-50">
    <h1 class="text-lg font-bold text-indigo-400">Wan-Law <span class="text-white text-xs font-normal">v6.2 Pro</span></h1>
    <button id="btnLogout" class="hidden px-2 py-1 rounded bg-red-900/20 text-red-400 text-[10px] border border-red-900/50">Logout</button>
  </header>

  <main class="w-full max-w-4xl mx-auto p-4">
    <section id="view-login" class="mt-20 flex justify-center px-4">
      <div class="w-full max-w-md bg-slate-800/50 rounded-2xl p-6 border border-slate-700 text-center shadow-xl">
        <button id="btnGoogle" class="w-full py-4 rounded-xl bg-indigo-600 font-bold transition shadow-lg">Log masuk Google</button>
      </div>
    </section>

    <section id="view-home" class="hidden">
      <div class="flex gap-2 mb-6">
        <input id="searchFiles" type="text" placeholder="Cari fail..." class="flex-1 px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-sm focus:outline-none" />
        <button id="btnAddFile" class="px-6 py-3 rounded-xl bg-indigo-600 font-bold text-sm">Tambah</button>
      </div>
      <div id="listFiles" class="grid gap-3 w-full"></div>
    </section>

    <section id="view-folders" class="hidden">
      <div class="flex items-center justify-between mb-4 gap-2">
        <button onclick="showView('home')" class="text-xs text-slate-400 bg-slate-800 px-3 py-1 rounded">← Kembali</button>
        <h3 id="labelFile" class="font-bold text-indigo-400 text-sm truncate break-text"></h3>
      </div>
      <div class="flex gap-2 mb-6">
        <input id="searchFolders" type="text" placeholder="Cari folder..." class="flex-1 px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-sm focus:outline-none" />
        <button id="btnAddFolder" class="px-6 py-3 rounded-xl bg-indigo-600 font-bold text-sm">Tambah</button>
      </div>
      <div id="listFolders" class="grid gap-3 w-full"></div>
    </section>

    <section id="view-note" class="hidden relative">
      <div class="flex items-center justify-end mb-3 gap-2">
        <div class="text-right">
          <h3 id="labelFolder" class="font-bold text-indigo-400 text-xs truncate break-text"></h3>
          <p id="saveStatus" class="text-[9px] text-slate-500 h-3 italic"></p>
        </div>
      </div>

      <div id="saveLoader" class="w-full h-1 bg-slate-800 hidden overflow-hidden mb-1">
        <div id="progressBar" class="progress-flow"></div>
      </div>

      <div class="flex flex-wrap items-center gap-1 p-2 bg-slate-800 rounded-t-xl border border-slate-700 sticky top-[60px] z-40 shadow-xl">
        <button id="btnBackToFolders" class="px-3 h-9 rounded bg-slate-700 hover:bg-slate-600 text-[10px] font-bold border border-slate-600 mr-1 text-white">← KEMBALI</button>
        
        <button title="Undo" class="w-9 h-9 flex items-center justify-center bg-slate-900 rounded hover:bg-slate-600" onclick="doCmd('undo')">↩</button>
        <button title="Redo" class="w-9 h-9 flex items-center justify-center bg-slate-900 rounded hover:bg-slate-600" onclick="doCmd('redo')">↪</button>
        <div class="h-6 w-[1px] bg-slate-600 mx-1"></div>
        
        <select onchange="doCmd('fontSize', this.value)" class="h-9 bg-slate-700 text-white rounded px-2 text-xs font-bold outline-none cursor-pointer border border-slate-600" title="Saiz Teks">
          <option value="1">Saiz 1</option>
          <option value="2">Saiz 2</option>
          <option value="3" selected>Saiz 3 (Normal)</option>
          <option value="4">Saiz 4</option>
          <option value="5">Saiz 5</option>
          <option value="6">Saiz 6</option>
          <option value="7">Saiz 7</option>
        </select>
        <div class="h-6 w-[1px] bg-slate-600 mx-1"></div>

        <button class="w-9 h-9 flex items-center justify-center bg-slate-700 rounded font-bold" onclick="doCmd('bold')">B</button>
        <button class="w-9 h-9 flex items-center justify-center bg-slate-700 rounded underline font-bold" onclick="doCmd('underline')">U</button>
        <input type="color" oninput="doCmd('foreColor', this.value)" class="w-9 h-9 bg-transparent cursor-pointer" title="Warna Teks"/>
        
        <button title="Tambah Jadual" class="w-9 h-9 flex items-center justify-center bg-slate-700 rounded font-bold text-lg" onclick="insertTable()">▦</button>

        <button title="Huraian Tahap 1" class="px-2 h-9 flex items-center justify-center bg-slate-700 rounded text-indigo-400 font-bold text-xs ml-1" onclick="insertBulletLine(1)">-</button>
        <button title="Huraian Tahap 2" class="px-2 h-9 flex items-center justify-center bg-slate-700 rounded text-purple-400 font-bold text-xs ml-1" onclick="insertBulletLine(2)">--</button>
        <button title="Huraian Tahap 3" class="px-2 h-9 flex items-center justify-center bg-slate-700 rounded text-pink-400 font-bold text-xs ml-1" onclick="insertBulletLine(3)">---</button>
        <button title="Huraian Tahap 4" class="px-2 h-9 flex items-center justify-center bg-slate-700 rounded text-rose-400 font-bold text-xs ml-1" onclick="insertBulletLine(4)">----</button>
        
        <button id="btnTranslate" title="Terjemah Teks Highlight" class="px-2 h-9 bg-purple-600/20 text-purple-400 border border-purple-500/50 rounded text-[10px] font-bold ml-1 mt-1 sm:mt-0">🌐 T.JEMAH</button>
        
        <button id="btnToggleMark" title="On/Off Penanda Bacaan" class="px-2 h-9 bg-green-600/20 text-green-400 border border-green-500/50 rounded text-[10px] font-bold ml-1 mt-1 sm:mt-0">📍 TANDA: ON</button>
        
        <button id="btnManualSave" class="ml-auto px-2 h-9 bg-indigo-900 text-indigo-100 text-[9px] rounded border border-indigo-500 font-bold mt-1 sm:mt-0">SIMPAN SEJARAH</button>
        <button id="btnHistory" class="px-2 h-9 bg-amber-600/20 text-amber-400 text-[9px] rounded border border-amber-900/50 font-bold ml-1 mt-1 sm:mt-0">🕒 LIHAT</button>
      </div>
      
      <button id="btnFlipTranslate" class="floating-flip" title="Tukar Bahasa (Flip)">🔄</button>

      <div id="editor" class="editor" contenteditable="true" spellcheck="false" placeholder="Tulis nota anda di sini..."></div>
      
      <div id="modalHistory" class="fixed inset-0 bg-black/90 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl">
          <div class="p-4 border-b border-slate-800 flex justify-between bg-slate-800/50 font-bold text-sm uppercase">
            <h4>Snapshot Terakhir</h4>
            <button onclick="toggleHistory(false)" class="text-slate-400 px-2 text-xl">&times;</button>
          </div>
          <div id="historyList" class="p-4 flex flex-col gap-3 max-h-[400px] overflow-y-auto text-center"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    // FIREBASE CONFIG - GUNA MILIK ANDA
    const firebaseConfig = {
      apiKey: "AIzaSyCtxOE42D07yFc9eK3nLMsOy50SmeSErwI",
      authDomain: "fatherstress-9e695.firebaseapp.com",
      projectId: "fatherstress-9e695",
      storageBucket: "fatherstress-9e695.firebasestorage.app",
      messagingSenderId: "147729735248",
      appId: "1:147729735248:web:f6771fee76727436a0fb55"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let state = { uid: null, fileId: null, folderId: null, noteId: null, saveTimer: null };

    // --- NAVIGATION ---
    function showView(id) {
      document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
      document.getElementById('view-' + id).classList.remove('hidden');
      window.scrollTo(0,0);
    }

    auth.onAuthStateChanged(user => {
      if (user) { 
        state.uid = user.uid; 
        document.getElementById('btnLogout').classList.remove('hidden'); 
        showView('home'); 
        loadFiles(); 
      } else { 
        showView('login'); 
        document.getElementById('btnLogout').classList.add('hidden'); 
      }
    });

    document.getElementById('btnGoogle').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    document.getElementById('btnLogout').onclick = () => auth.signOut();

    // --- CRUD (Susunan Abjad & Nombor) ---
    async function loadFiles() {
      const snap = await db.collection('users').doc(state.uid).collection('files').get();
      const list = document.getElementById('listFiles'); list.innerHTML = '';
      
      let items = [];
      snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
      
      items.sort((a, b) => {
        let titleA = (a.title || "").toLowerCase();
        let titleB = (b.title || "").toLowerCase();
        return titleA.localeCompare(titleB, undefined, { numeric: true, sensitivity: 'base' });
      });

      items.forEach(d => {
        const div = document.createElement('div');
        div.className = "bg-slate-800/60 p-4 rounded-xl border border-slate-700 flex justify-between items-center gap-2";
        div.innerHTML = `<button class="font-bold flex-1 text-left text-sm break-text">${d.title || 'Fail'}</button>
          <div class="flex gap-2"><button class="p-2 bg-slate-700 rounded text-xs edit-btn">✏️</button><button class="p-2 bg-red-900/20 text-red-500 rounded text-xs del-btn">🗑️</button></div>`;
        div.querySelector('button').onclick = () => { state.fileId = d.id; document.getElementById('labelFile').textContent = d.title; showView('folders'); loadFolders(); };
        div.querySelector('.edit-btn').onclick = () => editTitle('files', d.id, d.title, loadFiles);
        div.querySelector('.del-btn').onclick = () => deleteItem('files', d.id, loadFiles);
        list.appendChild(div);
      });
    }

    async function loadFolders() {
      const snap = await db.collection('users').doc(state.uid).collection('files').doc(state.fileId).collection('folders').get();
      const list = document.getElementById('listFolders'); list.innerHTML = '';
      
      let items = [];
      snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
      
      items.sort((a, b) => {
        let titleA = (a.title || "").toLowerCase();
        let titleB = (b.title || "").toLowerCase();
        return titleA.localeCompare(titleB, undefined, { numeric: true, sensitivity: 'base' });
      });

      items.forEach(d => {
        const div = document.createElement('div');
        div.className = "bg-slate-800/60 p-4 rounded-xl border border-slate-700 flex justify-between items-center gap-2";
        div.innerHTML = `<button class="font-bold flex-1 text-left text-sm break-text">${d.title || 'Folder'}</button>
          <div class="flex gap-2"><button class="p-2 bg-slate-700 rounded text-xs edit-btn">✏️</button><button class="p-2 bg-red-900/20 text-red-500 rounded text-xs del-btn">🗑️</button></div>`;
        div.querySelector('button').onclick = () => openNote(d.id, d.title);
        div.querySelector('.edit-btn').onclick = () => editTitle(`files/${state.fileId}/folders`, d.id, d.title, loadFolders);
        div.querySelector('.del-btn').onclick = () => deleteItem(`files/${state.fileId}/folders`, d.id, loadFolders);
        list.appendChild(div);
      });
    }

    async function openNote(id, title) {
      state.folderId = id; document.getElementById('labelFolder').textContent = title;
      const editor = document.getElementById('editor'); editor.innerHTML = 'Memuatkan nota...';
      showView('note');
      const noteRef = db.collection('users').doc(state.uid).collection('files').doc(state.fileId).collection('folders').doc(id).collection('notes');
      const snap = await noteRef.limit(1).get();
      if (snap.empty) {
        const n = await noteRef.add({ content: '', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        state.noteId = n.id; editor.innerHTML = '';
      } else {
        state.noteId = snap.docs[0].id; editor.innerHTML = snap.docs[0].data().content || '';
        
        // KOD TAMBAHAN (INJECTED): Auto-Scroll ke penanda .last-read-mark bila buka nota
        setTimeout(() => {
          const mark = editor.querySelector('.last-read-mark');
          if (mark) {
            mark.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }, 300);
      }
    }

    // --- TURBO AUTO-SAVE (2.5 SAAT) ---
    const editorEl = document.getElementById('editor');
    editorEl.oninput = () => {
      clearTimeout(state.saveTimer);
      state.saveTimer = setTimeout(async () => {
        if(!state.noteId) return;
        const content = editorEl.innerHTML;
        const noteDoc = db.collection('users').doc(state.uid).collection('files').doc(state.fileId).collection('folders').doc(state.folderId).collection('notes').doc(state.noteId);
        try {
          await noteDoc.update({ content, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
          document.getElementById('saveStatus').textContent = 'Cloud synced';
          setTimeout(() => { if(document.getElementById('saveStatus').textContent === 'Cloud synced') document.getElementById('saveStatus').textContent = ''; }, 1500);
        } catch(e) { console.error("Auto-save error:", e); }
      }, 2500);
    };

    // =========================================================================
    // --- KOD TAMBAHAN: FUNGSI ON/OFF PENANDA BACAAN ---
    // =========================================================================
    window.isMarkingEnabled = true; // Secara lalai, fungsi tanda adalah ON

    const btnToggleMark = document.getElementById('btnToggleMark');
    if (btnToggleMark) {
        btnToggleMark.onclick = () => {
            window.isMarkingEnabled = !window.isMarkingEnabled; // Tukar status ON/OFF
            
            if (window.isMarkingEnabled) {
                // Jika ON (Warna Hijau)
                btnToggleMark.innerHTML = "📍 TANDA: ON";
                btnToggleMark.className = "px-2 h-9 bg-green-600/20 text-green-400 border border-green-500/50 rounded text-[10px] font-bold ml-1 mt-1 sm:mt-0";
            } else {
                // Jika OFF (Warna Merah)
                btnToggleMark.innerHTML = "📍 TANDA: OFF";
                btnToggleMark.className = "px-2 h-9 bg-red-600/20 text-red-400 border border-red-500/50 rounded text-[10px] font-bold ml-1 mt-1 sm:mt-0";
            }
        };
    }
    // -------------------------------------------------------------------------

    // --- KOD TAMBAHAN (INJECTED): FUNGSI DOUBLE CLICK UNTUK PENANDA BACAAN ---
    editorEl.addEventListener('dblclick', () => {
      // KOD TAMBAHAN: Semak jika fungsi penanda ditutup (OFF), hentikan tindakan
      if (window.isMarkingEnabled === false) return;

      const selection = window.getSelection();
      if (!selection.rangeCount || selection.isCollapsed) return;

      // 1. Buang penanda lama jika ada
      const oldMark = editorEl.querySelector('.last-read-mark');
      if (oldMark) {
        const parent = oldMark.parentNode;
        while(oldMark.firstChild) {
          parent.insertBefore(oldMark.firstChild, oldMark);
        }
        parent.removeChild(oldMark);
      }

      // 2. Tanda ayat/perkataan baru
      const range = selection.getRangeAt(0);
      const span = document.createElement('span');
      span.className = 'last-read-mark';
      range.surroundContents(span);
      selection.removeAllRanges();

      // 3. Wajib trigger event 'input' supaya auto-save berfungsi
      editorEl.dispatchEvent(new Event('input'));
    });

    // --- KOD TAMBAHAN (INJECTED): FUNGSI TRANSLATE INLINE ---
    document.getElementById('btnTranslate').onclick = () => {
      const selection = window.getSelection();
      if (!selection.rangeCount || selection.isCollapsed) {
        alert("Sila highlight (pilih) teks terlebih dahulu untuk diterjemah.");
        return;
      }
      
      const text = selection.toString().trim();
      const translation = prompt(`Masukkan maksud terjemahan untuk:\n"${text}"`);
      
      if (translation) {
        const range = selection.getRangeAt(0);
        const span = document.createElement('span');
        span.className = 'has-translate text-purple-400 font-medium';
        span.dataset.en = text;
        span.dataset.ms = translation;
        span.textContent = text; // Kekalkan paparan asal dahulu
        
        range.surroundContents(span);
        selection.removeAllRanges();
        
        // Trigger auto-save
        editorEl.dispatchEvent(new Event('input'));
      }
    };

    // --- KOD TAMBAHAN (INJECTED): FUNGSI FLIP TRANSLATE ---
    document.getElementById('btnFlipTranslate').onclick = () => {
      const selection = window.getSelection();
      let isInsideTranslate = false;
      let targetSpan = null;
      
      // Kenal pasti jika cursor / highlight berada di dalam elemen span .has-translate
      if (selection.rangeCount > 0) {
        let node = selection.anchorNode;
        while(node && node !== editorEl) {
          if(node.nodeType === 1 && node.classList.contains('has-translate')) {
            isInsideTranslate = true;
            targetSpan = node;
            break;
          }
          node = node.parentNode;
        }
      }

      if (isInsideTranslate && targetSpan) {
        // Flip SATU perkataan spesifik sahaja
        targetSpan.textContent = (targetSpan.textContent === targetSpan.dataset.en) ? targetSpan.dataset.ms : targetSpan.dataset.en;
      } else {
        // Flip KESEMUA perkataan di dalam nota jika cursor berada di luar
        const allTranslates = editorEl.querySelectorAll('.has-translate');
        if(allTranslates.length === 0) return;
        
        const firstOne = allTranslates[0];
        const isCurrentlyEn = (firstOne.textContent === firstOne.dataset.en);
        
        allTranslates.forEach(span => {
          span.textContent = isCurrentlyEn ? span.dataset.ms : span.dataset.en;
        });
      }
      
      // Trigger auto-save untuk simpan perubahan ke Firebase
      editorEl.dispatchEvent(new Event('input'));
    };

    // --- KOD TAMBAHAN (INJECTED): PEMBAIKAN FUNGSI CARIAN (SEARCH) ---
    document.getElementById('searchFiles').addEventListener('input', function() {
      const query = this.value.toLowerCase();
      const filesList = document.querySelectorAll('#listFiles > div');
      filesList.forEach(el => {
        const title = el.querySelector('button').textContent.toLowerCase();
        el.style.display = title.includes(query) ? 'flex' : 'none'; // separa-tepat (includes)
      });
    });

    document.getElementById('searchFolders').addEventListener('input', function() {
      const query = this.value.toLowerCase();
      const foldersList = document.querySelectorAll('#listFolders > div');
      foldersList.forEach(el => {
        const title = el.querySelector('button').textContent.toLowerCase();
        el.style.display = title.includes(query) ? 'flex' : 'none'; // separa-tepat (includes)
      });
    });
    // -----------------------------------------------------------

    // --- PENYELESAIAN MASALAH HILANG HIGHLIGHT DI TELEFON ---
    let savedSelection = null;
    
    function saveSelection() {
      const sel = window.getSelection();
      if (sel.getRangeAt && sel.rangeCount > 0) {
        savedSelection = sel.getRangeAt(0);
      }
    }

    function restoreSelection() {
      if (savedSelection) {
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(savedSelection);
      }
    }

    // Sentiasa simpan highlight terkini bila kita sentuh/menaip dalam editor
    editorEl.addEventListener('keyup', saveSelection);
    editorEl.addEventListener('mouseup', saveSelection);
    editorEl.addEventListener('touchend', saveSelection);
    editorEl.addEventListener('focusout', saveSelection);

    // Fungsi doCmd yang dikemaskini untuk cover phone
    function doCmd(c, v=null) {
      restoreSelection(); // Tampal balik highlight yang tersimpan
      document.execCommand(c, false, v);
      editorEl.focus();
      saveSelection(); // Simpan balik state baru lepas tukar
    }
    // --------------------------------------------------------

    // --- FUNGSI JADUAL YANG DIBAIKI (DENGAN MEMORI) ---
    function insertTable() {
      saveSelection(); 
      
      const rows = prompt("Berapa baris (rows) yang anda perlukan?", "3");
      const cols = prompt("Berapa lajur (columns) yang anda perlukan?", "3");
      
      if (rows && cols && !isNaN(rows) && !isNaN(cols)) {
        let tableHTML = '<table style="width:100%; border-collapse: collapse; margin: 10px 0; border: 1px solid #475569;"><tbody>';
        for (let r = 0; r < parseInt(rows); r++) {
          tableHTML += '<tr>';
          for (let c = 0; c < parseInt(cols); c++) {
            tableHTML += `<td style="border: 1px solid #475569; padding: 8px; min-width: 50px;">Sel</td>`;
          }
          tableHTML += '</tr>';
        }
        tableHTML += '</tbody></table><br/>';
        
        restoreSelection(); 
        document.execCommand('insertHTML', false, tableHTML);
        editorEl.focus();
        saveSelection();
      }
    }

    // --- FUNGSI BULLET HURAIAN BERSAMBUNG (DIBETULKAN) ---
    function insertBulletLine(level) {
      saveSelection(); 
      
      // Gunakan simbol "Em Dash" (—) yang akan bersambung rapat secara automatik
      let dash = "—"; 
      let html = '<span style="color: #a855f7; font-weight: bold;">' + dash.repeat(level) + ' </span>';
      
      restoreSelection(); 
      document.execCommand('insertHTML', false, html);
      editorEl.focus();
      saveSelection();
    }

    // --- MANUAL SEJARAH (OVERWRITE - HANYA SIMPAN SATU TERAKHIR) ---
    document.getElementById('btnManualSave').onclick = async () => {
      const content = editorEl.innerHTML;
      if(!content || !state.noteId) return alert("Nota kosong.");
      
      const loader = document.getElementById('saveLoader');
      const bar = document.getElementById('progressBar');
      loader.classList.remove('hidden');
      bar.style.width = '0%';
      setTimeout(() => bar.style.width = '60%', 200);

      try {
        const noteDoc = db.collection('users').doc(state.uid).collection('files').doc(state.fileId).collection('folders').doc(state.folderId).collection('notes').doc(state.noteId);
        
        const oldHistory = await noteDoc.collection('history_manual').get();
        const batch = db.batch();
        oldHistory.forEach(doc => batch.delete(doc.ref));
        await batch.commit();

        await noteDoc.collection('history_manual').add({ content, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        
        bar.style.width = '100%';
        setTimeout(() => {
          loader.classList.add('hidden');
          document.getElementById('saveStatus').textContent = 'Sejarah Diperbaharui!';
          setTimeout(() => document.getElementById('saveStatus').textContent = '', 2000);
        }, 800);
      } catch (e) {
        loader.classList.add('hidden');
        alert('Gagal simpan: ' + e.message);
      }
    };

    async function toggleHistory(show) {
      const modal = document.getElementById('modalHistory');
      if (!show) return modal.classList.add('hidden');
      modal.classList.remove('hidden');
      const list = document.getElementById('historyList');
      list.innerHTML = '<p class="text-xs animate-pulse">Menarik data...</p>';

      const noteDoc = db.collection('users').doc(state.uid).collection('files').doc(state.fileId).collection('folders').doc(state.folderId).collection('notes').doc(state.noteId);
      const snap = await noteDoc.collection('history_manual').orderBy('timestamp', 'desc').limit(1).get();

      list.innerHTML = '';
      if(snap.empty) return list.innerHTML = '<p class="text-xs opacity-50 p-10">Tiada sejarah manual disimpan.</p>';

      snap.forEach(doc => {
        const d = doc.data();
        const btn = document.createElement('button');
        btn.className = `w-full p-4 rounded-xl border border-indigo-900 bg-indigo-900/10 text-left`;
        btn.innerHTML = `<span class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest">Snapshot Terakhir</span><br><span class="text-xs">${d.timestamp?.toDate().toLocaleString() || 'Baru'}</span>`;
        btn.onclick = () => { if(confirm(`Pulihkan versi ini?`)) { editorEl.innerHTML = d.content; modal.classList.add('hidden'); editorEl.dispatchEvent(new Event('input')); }};
        list.appendChild(btn);
      });
    }

    // --- TOOLS ---
    document.getElementById('btnHistory').onclick = () => toggleHistory(true);
    document.getElementById('btnBackToFolders').onclick = () => showView('folders');
    
    async function editTitle(p,id,o,cb){ const n = prompt('Tukar Nama:',o); if(n && n!==o){ await db.collection('users').doc(state.uid).collection(p).doc(id).update({title:n}); cb(); } }
    async function deleteItem(p,id,cb){ if(confirm('Padam item ini secara kekal?')){ await db.collection('users').doc(state.uid).collection(p).doc(id).delete(); cb(); } }
    
    document.getElementById('btnAddFile').onclick = async () => { const t = prompt('Nama Fail Baru?'); if(t) { await db.collection('users').doc(state.uid).collection('files').add({ title: t, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); loadFiles(); }};
    document.getElementById('btnAddFolder').onclick = async () => { const t = prompt('Nama Folder Baru?'); if(t) { await db.collection('users').doc(state.uid).collection('files').doc(state.fileId).collection('folders').add({ title: t, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); loadFolders(); }};

  </script> <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
