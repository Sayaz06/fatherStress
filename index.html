<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Wan-Law v6.2 Pro</title>
  <link rel="manifest" href="manifest.webmanifest">
  
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icons-192-v2.png">
  <link rel="apple-touch-icon" href="icons/icons-192-v2.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <style>
    :root { --bg: #020617; }
    body { background-color: var(--bg); color: #e5e7eb; font-family: system-ui, sans-serif; overflow-x: hidden; }
    .editor {
      min-height: 500px; background: #0b1220; border: 1px solid #1f2937;
      border-radius: 0 0 12px 12px; padding: 16px; outline: none; color: white;
      font-size: 16px; line-height: 1.6; word-break: break-word;
    }
    .hidden { display: none !important; }
    .break-text { word-break: break-word; overflow-wrap: break-word; white-space: normal; }
    
    /* Animasi Progress Bar Flow */
    .progress-flow {
      width: 0%; height: 100%;
      background: linear-gradient(90deg, #6366f1, #a855f7, #6366f1);
      background-size: 200% 100%;
      animation: flow 1.5s linear infinite;
      transition: width 0.3s ease;
    }
    @keyframes flow { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Gaya Tambahan Untuk Jadual (Table) Dalam Editor */
    .editor table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      margin-bottom: 10px;
    }
    .editor th, .editor td {
      border: 1px solid #475569;
      padding: 8px;
      min-width: 50px;
    }

    /* --- GAYA BAHARU DITAMBAH (INJECTED) --- */
    .last-read-mark { 
      background-color: #fef08a; 
      color: #1e293b; 
      border-radius: 4px; 
      padding: 2px 4px; 
      box-shadow: 0 0 5px rgba(254, 240, 138, 0.4); 
    }
    .has-translate { 
      border-bottom: 2px dashed #a855f7; 
      cursor: pointer; 
      color: #c084fc; 
      transition: color 0.2s; 
    }
    .floating-flip { 
      position: fixed; 
      right: 16px; 
      top: 35%; 
      z-index: 60; 
      width: 46px; 
      height: 46px; 
      border-radius: 50%; 
      background-color: #4f46e5; 
      color: white; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
      font-size: 20px; 
      cursor: pointer; 
      transition: transform 0.2s, background-color 0.2s; 
      border: 2px solid #818cf8; 
    }
    .floating-flip:active { 
      transform: scale(0.9); 
      background-color: #4338ca; 
    }
    
    /* KOD TAMBAHAN BARU: Butang Terapung Halaman Audio */
    .floating-audio-page { 
      position: fixed; 
      right: 16px; 
      top: 45%; /* Bawah sikit dari butang flip */
      z-index: 60; 
      width: 46px; 
      height: 46px; 
      border-radius: 50%; 
      background-color: #10b981; 
      color: white; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
      font-size: 20px; 
      cursor: pointer; 
      transition: transform 0.2s, background-color 0.2s; 
      border: 2px solid #34d399; 
    }
    .floating-audio-page:active { 
      transform: scale(0.9); 
      background-color: #059669; 
    }
    .editor img { max-width: 100%; border-radius: 8px; margin: 10px 0; border: 1px solid #334155; }
  </style>
</head>
<body class="min-h-screen w-full">

  <header class="w-full flex items-center justify-between px-4 py-3 border-b border-slate-800 bg-slate-900/80 sticky top-0 z-50">
    <h1 class="text-lg font-bold text-indigo-400">Wan-Law <span class="text-white text-xs font-normal">v6.2 Pro</span></h1>
    <button id="btnLogout" class="hidden px-2 py-1 rounded bg-red-900/20 text-red-400 text-[10px] border border-red-900/50">Logout</button>
  </header>

  <main class="w-full max-w-4xl mx-auto p-4">
    <section id="view-login" class="mt-20 flex justify-center px-4">
      <div class="w-full max-w-md bg-slate-800/50 rounded-2xl p-6 border border-slate-700 text-center shadow-xl">
        <button id="btnGoogle" class="w-full py-4 rounded-xl bg-indigo-600 font-bold transition shadow-lg">Log masuk Google</button>
      </div>
    </section>

    <section id="view-home" class="hidden">
      <div class="flex gap-2 mb-6">
        <input id="searchFiles" type="text" placeholder="Cari fail..." class="flex-1 px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-sm focus:outline-none" />
        <button id="btnAddFile" class="px-6 py-3 rounded-xl bg-indigo-600 font-bold text-sm">Tambah</button>
      </div>
      <div id="listFiles" class="grid gap-3 w-full"></div>
    </section>

    <section id="view-folders" class="hidden">
      <div class="flex items-center justify-between mb-4 gap-2">
        <button onclick="showView('home')" class="text-xs text-slate-400 bg-slate-800 px-3 py-1 rounded">← Kembali</button>
        <h3 id="labelFile" class="font-bold text-indigo-400 text-sm truncate break-text"></h3>
      </div>
      <div class="flex gap-2 mb-6">
        <input id="searchFolders" type="text" placeholder="Cari folder..." class="flex-1 px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-sm focus:outline-none" />
        <button id="btnAddFolder" class="px-6 py-3 rounded-xl bg-indigo-600 font-bold text-sm">Tambah</button>
      </div>
      <div id="listFolders" class="grid gap-3 w-full"></div>
    </section>

    <section id="view-note" class="hidden relative">
      <div class="flex items-center justify-end mb-3 gap-2">
        <div class="text-right">
          <h3 id="labelFolder" class="font-bold text-indigo-400 text-xs truncate break-text"></h3>
          <p id="saveStatus" class="text-[9px] text-slate-500 h-3 italic"></p>
        </div>
      </div>

      <div id="saveLoader" class="w-full h-1 bg-slate-800 hidden overflow-hidden mb-1">
        <div id="progressBar" class="progress-flow"></div>
      </div>

      <div class="flex flex-wrap items-center gap-1 p-2 bg-slate-800 rounded-t-xl border border-slate-700 sticky top-[60px] z-40 shadow-xl">
        <button id="btnBackToFolders" class="px-3 h-9 rounded bg-slate-700 hover:bg-slate-600 text-[10px] font-bold border border-slate-600 mr-1 text-white">← KEMBALI</button>
        
        <button title="Undo" class="w-9 h-9 flex items-center justify-center bg-slate-900 rounded hover:bg-slate-600" onclick="doCmd('undo')">↩</button>
        <button title="Redo" class="w-9 h-9 flex items-center justify-center bg-slate-900 rounded hover:bg-slate-600" onclick="doCmd('redo')">↪</button>
        <div class="h-6 w-[1px] bg-slate-600 mx-1"></div>
        
        <select onchange="doCmd('fontSize', this.value)" class="h-9 bg-slate-700 text-white rounded px-2 text-xs font-bold outline-none cursor-pointer border border-slate-600" title="Saiz Teks">
          <option value="1">Saiz 1</option>
          <option value="2">Saiz 2</option>
          <option value="3" selected>Saiz 3 (Normal)</option>
          <option value="4">Saiz 4</option>
          <option value="5">Saiz 5</option>
          <option value="6">Saiz 6</option>
          <option value="7">Saiz 7</option>
        </select>
        <div class="h-6 w-[1px] bg-slate-600 mx-1"></div>

        <button class="w-9 h-9 flex items-center justify-center bg-slate-700 rounded font-bold" onclick="doCmd('bold')">B</button>
        <button class="w-9 h-9 flex items-center justify-center bg-slate-700 rounded underline font-bold" onclick="doCmd('underline')">U</button>
        <input type="color" oninput="doCmd('foreColor', this.value)" class="w-9 h-9 bg-transparent cursor-pointer" title="Warna Teks"/>
        
        <button title="Tambah Jadual" class="w-9 h-9 flex items-center justify-center bg-slate-700 rounded font-bold text-lg" onclick="insertTable()">▦</button>

        <button title="Tambah Gambar" class="w-9 h-9 flex items-center justify-center bg-slate-700 rounded font-bold text-lg" onclick="document.getElementById('file-image-input').click()">🖼️</button>
        <input type="file" id="file-image-input" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
        
        <button title="Huraian Tahap 1" class="px-2 h-9 flex items-center justify-center bg-slate-700 rounded text-white font-bold text-xs ml-1" onclick="insertBulletLine(1)">-</button>
        <button title="Huraian Tahap 2" class="px-2 h-9 flex items-center justify-center bg-slate-700 rounded text-white font-bold text-xs ml-1" onclick="insertBulletLine(2)">--</button>
        <button title="Huraian Tahap 3" class="px-2 h-9 flex items-center justify-center bg-slate-700 rounded text-white font-bold text-xs ml-1" onclick="insertBulletLine(3)">---</button>
        <button title="Huraian Tahap 4" class="px-2 h-9 flex items-center justify-center bg-slate-700 rounded text-white font-bold text-xs ml-1" onclick="insertBulletLine(4)">----</button>
        
        <button id="btnTranslate" title="Terjemah Teks Highlight" class="px-2 h-9 bg-purple-600/20 text-purple-400 border border-purple-500/50 rounded text-[10px] font-bold ml-1 mt-1 sm:mt-0">🌐 T.JEMAH</button>
        
        <button id="btnToggleMark" title="On/Off Penanda Bacaan" class="px-2 h-9 bg-green-600/20 text-green-400 border border-green-500/50 rounded text-[10px] font-bold ml-1 mt-1 sm:mt-0">📍 TANDA: ON</button>
        
        <button id="btnManualSave" class="ml-auto px-2 h-9 bg-indigo-900 text-indigo-100 text-[9px] rounded border border-indigo-500 font-bold mt-1 sm:mt-0">SIMPAN SEJARAH</button>
        <button id="btnHistory" class="px-2 h-9 bg-amber-600/20 text-amber-400 text-[9px] rounded border border-amber-900/50 font-bold ml-1 mt-1 sm:mt-0">🕒 LIHAT</button>
      </div>
      
      <button id="btnFlipTranslate" class="floating-flip" title="Tukar Bahasa (Flip)">🔄</button>
      
      <button id="btnOpenAudioPage" class="floating-audio-page" title="Buka Halaman Audio Anak">🎵</button>

      <div id="editor" class="editor" contenteditable="true" spellcheck="false" placeholder="Tulis nota anda di sini..."></div>
      
      <div id="modalHistory" class="fixed inset-0 bg-black/90 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl">
          <div class="p-4 border-b border-slate-800 flex justify-between bg-slate-800/50 font-bold text-sm uppercase">
            <h4>Snapshot Terakhir</h4>
            <button onclick="toggleHistory(false)" class="text-slate-400 px-2 text-xl">&times;</button>
          </div>
          <div id="historyList" class="p-4 flex flex-col gap-3 max-h-[400px] overflow-y-auto text-center"></div>
        </div>
      </div>
    </section>

    <section id="view-audio-page" class="hidden">
      <div class="flex items-center justify-between mb-4 gap-2">
        <button id="btnBackToNoteFromAudio" class="text-xs text-slate-400 bg-slate-800 px-3 py-1 rounded border border-slate-700">← Kembali ke Nota</button>
        <h3 class="font-bold text-emerald-400 text-sm truncate break-text">Senarai Audio Nota</h3>
      </div>
      
      <div class="flex gap-2 mb-4">
        <input type="file" id="file-audiopage-input" accept="audio/*" class="hidden" onchange="handleAudioPageUpload(event)">
        <button onclick="document.getElementById('file-audiopage-input').click()" class="w-full px-6 py-4 rounded-xl bg-emerald-600 font-bold text-sm shadow-lg border border-emerald-500 hover:bg-emerald-500 transition">➕ Tambah Audio Baru</button>
      </div>
      
      <div id="saveLoaderAudio" class="w-full h-1 bg-slate-800 hidden overflow-hidden mb-4 rounded">
        <div id="progressBarAudio" class="progress-flow" style="background: linear-gradient(90deg, #10b981, #059669, #10b981);"></div>
      </div>
      <p id="audioUploadStatus" class="text-xs text-emerald-400 mb-4 text-center italic"></p>
      
      <div id="listAudioPage" class="grid gap-4 w-full pb-20"></div>
    </section>

  </main>

  <script>
    // FIREBASE CONFIG - GUNA MILIK ANDA
    const firebaseConfig = {
      apiKey: "AIzaSyCtxOE42D07yFc9eK3nLMsOy50SmeSErwI",
      authDomain: "fatherstress-9e695.firebaseapp.com",
      projectId: "fatherstress-9e695",
      storageBucket: "fatherstress-9e695.firebasestorage.app",
      messagingSenderId: "147729735248",
      appId: "1:147729735248:web:f6771fee76727436a0fb55"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    // KOD TAMBAHAN: Initialize Firebase Storage
    const storage = firebase.storage();

    let state = { user: null, currentFileId: null, currentFolderId: null, currentNoteId: null, lastSavedContent: "" };

    const views = { login: document.getElementById('view-login'), home: document.getElementById('view-home'), folders: document.getElementById('view-folders'), note: document.getElementById('view-note') };
    const editor = document.getElementById('editor'), historyList = document.getElementById('history-list'), saveStatus = document.getElementById('save-status');

    // ==========================================
    // KOD AUDIO PAGE: DAFTARKAN VIEW BARU
    // ==========================================
    views.audioPage = document.getElementById('view-audio-page');

    function showPage(viewName) {
        Object.keys(views).forEach(key => views[key].classList.add('hidden'));
        if(views[viewName]) views[viewName].classList.remove('hidden');
        
        const btnLogout = document.getElementById('btnLogout');
        if(btnLogout) btnLogout.classList.toggle('hidden', viewName === 'login');
    }

    auth.onAuthStateChanged(user => {
        state.user = user;
        if (user) { 
            state.uid = user.uid; 
            showPage('home'); 
            loadFiles(); 
        } else { 
            showPage('login'); 
        }
    });

    const btnGoogle = document.getElementById('btnGoogle');
    if(btnGoogle) btnGoogle.onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());

    const btnLogout = document.getElementById('btnLogout');
    if(btnLogout) btnLogout.onclick = () => auth.signOut();

    const filesRef = () => db.collection('users').doc(state.uid).collection('files');
    const foldersRef = (fId) => filesRef().doc(fId).collection('folders');
    const notesRef = (fId, folId) => foldersRef(fId).doc(folId).collection('notes');

    // --- RENDERER DENGAN BUTTON EDIT KHUSUS & SUSUNAN ABJAD/ANGKA ---
    function renderCleanItems(snapshot, targetEl, onOpen, onUpdate, onDelete) {
        if(!targetEl) return;
        targetEl.innerHTML = '';
        let items = [];
        snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));

        items.sort((a, b) => {
            let titleA = (a.title || "").toLowerCase();
            let titleB = (b.title || "").toLowerCase();
            return titleA.localeCompare(titleB, undefined, { numeric: true, sensitivity: 'base' });
        });

        items.forEach(item => {
            const div = document.createElement('div');
            div.className = "bg-slate-800/60 p-4 rounded-xl border border-slate-700 flex justify-between items-center gap-2";
            div.innerHTML = `<button class="font-bold flex-1 text-left text-sm break-text">${item.title || 'Fail/Folder'}</button>
              <div class="flex gap-2"><button class="p-2 bg-slate-700 rounded text-xs edit-btn">✏️</button><button class="p-2 bg-red-900/20 text-red-500 rounded text-xs del-btn">🗑️</button></div>`;
            div.querySelector('button').onclick = () => onOpen(item.id, item.title);
            div.querySelector('.edit-btn').onclick = () => {
                const newTitle = prompt("Masukkan tajuk baharu:", item.title);
                if (newTitle !== null && newTitle.trim() !== "") {
                    onUpdate(item.id, newTitle.trim());
                    if(state.currentFileId && views.folders && views.folders.classList.contains('hidden')) { loadFiles(); } else { loadFolders(); }
                }
            };
            div.querySelector('.del-btn').onclick = () => onDelete(item.id);
            targetEl.appendChild(div);
        });
    }

    // --- LOGIC FUNCTIONS ---
    async function loadFiles() {
        const snap = await filesRef().get(); 
        renderCleanItems(snap, document.getElementById('listFiles'), openFile, (id, t) => filesRef().doc(id).update({title: t}), deleteFile);
    }

    function openFile(id, title) {
        state.currentFileId = id;
        const labelFile = document.getElementById('labelFile');
        if(labelFile) labelFile.innerText = title;
        showPage('folders'); loadFolders();
    }

    async function deleteFile(id) { if(confirm("Padam fail?")) { await filesRef().doc(id).delete(); loadFiles(); } }

    async function loadFolders() {
        const snap = await foldersRef(state.currentFileId).get();
        renderCleanItems(snap, document.getElementById('listFolders'), openFolder, (id, t) => foldersRef(state.currentFileId).doc(id).update({title: t}), deleteFolder);
    }

    async function deleteFolder(id) { if(confirm("Padam folder?")) { await foldersRef(state.currentFileId).doc(id).delete(); loadFolders(); } }

    // --- LOGIK HISTORY KEKAL & BUKA NOTA ---
    async function openFolder(id, title) {
        state.currentFolderId = id;
        const labelFolder = document.getElementById('labelFolder');
        if(labelFolder) labelFolder.innerText = title;
        showPage('note');
        
        const nRef = notesRef(state.currentFileId, id);
        const snap = await nRef.limit(1).get();
        if (snap.empty) {
            const n = await nRef.add({ content: '', history: {}, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            state.currentNoteId = n.id;
            if(editor) editor.innerHTML = '';
        } else {
            state.currentNoteId = snap.docs[0].id;
            const docData = snap.docs[0].data();
            if(editor) {
                editor.innerHTML = docData.content || '';
                state.lastSavedContent = docData.content || '';
                
                setTimeout(() => {
                    const mark = editor.querySelector('.last-read-mark');
                    if (mark) { mark.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
                }, 300);
            }
        }

        nRef.doc(state.currentNoteId).onSnapshot(doc => {
            const data = doc.data();
            // Halang update if typing to prevent cursor jump
            if (data && editor && editor.innerHTML !== data.content && !editor.contains(document.activeElement)) { 
                editor.innerHTML = data.content || ''; 
                state.lastSavedContent = data.content; 
            }
        });
    }

    // Auto Save
    let saveTimer;
    if(editor) {
        editor.oninput = () => {
            const sStatus = document.getElementById('saveStatus');
            if(sStatus) sStatus.innerText = "Menaip...";
            clearTimeout(saveTimer);
            saveTimer = setTimeout(async () => {
                if (editor.innerHTML === state.lastSavedContent) return;
                if(sStatus) sStatus.innerText = "Menyimpan...";
                
                const docRef = notesRef(state.currentFileId, state.currentFolderId).doc(state.currentNoteId);
                await docRef.update({ content: editor.innerHTML, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                state.lastSavedContent = editor.innerHTML;
                
                if(sStatus) {
                    sStatus.innerText = "Cloud synced";
                    setTimeout(() => { if(sStatus.innerText === 'Cloud synced') sStatus.innerText = ''; }, 1500);
                }
            }, 2500);
        };
    }

    // --- PENYELESAIAN MASALAH HILANG HIGHLIGHT DI TELEFON ---
    let savedSelection = null;
    function saveSelection() {
        const sel = window.getSelection();
        if (sel.getRangeAt && sel.rangeCount > 0) { savedSelection = sel.getRangeAt(0); }
    }
    function restoreSelection() {
        if (savedSelection) {
            const sel = window.getSelection();
            sel.removeAllRanges(); sel.addRange(savedSelection);
        }
    }
    if(editor) {
        editor.addEventListener('keyup', saveSelection);
        editor.addEventListener('mouseup', saveSelection);
        editor.addEventListener('touchend', saveSelection);
        editor.addEventListener('focusout', saveSelection);
    }
    window.doCmd = function(c, v=null) {
        restoreSelection(); document.execCommand(c, false, v);
        if(editor) editor.focus(); saveSelection(); 
    };

    // --- FUNGSI JADUAL & BULLET ---
    window.insertTable = function() {
        saveSelection(); 
        const rows = prompt("Berapa baris (rows)?", "3"); const cols = prompt("Berapa lajur (columns)?", "3");
        if (rows && cols && !isNaN(rows) && !isNaN(cols)) {
            let tableHTML = '<table style="width:100%; border-collapse: collapse; margin: 10px 0; border: 1px solid #475569;"><tbody>';
            for (let r = 0; r < parseInt(rows); r++) {
                tableHTML += '<tr>';
                for (let c = 0; c < parseInt(cols); c++) { tableHTML += `<td style="border: 1px solid #475569; padding: 8px; min-width: 50px;">Sel</td>`; }
                tableHTML += '</tr>';
            }
            tableHTML += '</tbody></table><br/>';
            restoreSelection(); document.execCommand('insertHTML', false, tableHTML);
            if(editor) editor.focus(); saveSelection();
        }
    };

    window.insertBulletLine = function(level) {
        saveSelection(); 
        let html = "—".repeat(level) + ' ';
        restoreSelection(); document.execCommand('insertHTML', false, html);
        if(editor) editor.focus(); saveSelection();
    };

    // --- FUNGSI ON/OFF PENANDA BACAAN & DOUBLE CLICK ---
    window.isMarkingEnabled = true;
    const btnToggleMark = document.getElementById('btnToggleMark');
    if (btnToggleMark) {
        btnToggleMark.onclick = () => {
            window.isMarkingEnabled = !window.isMarkingEnabled;
            if (window.isMarkingEnabled) {
                btnToggleMark.innerHTML = "📍 TANDA: ON";
                btnToggleMark.className = "px-2 h-9 bg-green-600/20 text-green-400 border border-green-500/50 rounded text-[10px] font-bold ml-1 mt-1 sm:mt-0";
            } else {
                btnToggleMark.innerHTML = "📍 TANDA: OFF";
                btnToggleMark.className = "px-2 h-9 bg-red-600/20 text-red-400 border border-red-500/50 rounded text-[10px] font-bold ml-1 mt-1 sm:mt-0";
            }
        };
    }

    if (editor) {
        editor.addEventListener('dblclick', (e) => {
            if (window.isMarkingEnabled === false) return;
            const selection = window.getSelection();
            if (!selection.rangeCount || selection.isCollapsed) return;

            const oldMark = editor.querySelector('.last-read-mark');
            if (oldMark) {
                const parent = oldMark.parentNode;
                while(oldMark.firstChild) { parent.insertBefore(oldMark.firstChild, oldMark); }
                parent.removeChild(oldMark);
            }

            const range = selection.getRangeAt(0);
            const span = document.createElement('span');
            span.className = 'last-read-mark';
            range.surroundContents(span);
            selection.removeAllRanges();
            editor.dispatchEvent(new Event('input'));
        });
    }

    // --- FUNGSI TRANSLATE INLINE & FLIP ---
    document.getElementById('btnTranslate').onclick = () => {
        const selection = window.getSelection();
        if (!selection.rangeCount || selection.isCollapsed) return alert("Sila highlight (pilih) teks terlebih dahulu untuk diterjemah.");
        const text = selection.toString().trim();
        const translation = prompt(`Masukkan maksud terjemahan untuk:\n"${text}"`);
        if (translation) {
            const range = selection.getRangeAt(0);
            const span = document.createElement('span');
            span.className = 'has-translate text-purple-400 font-medium';
            span.dataset.en = text; span.dataset.ms = translation; span.textContent = text; 
            range.surroundContents(span); selection.removeAllRanges();
            if(editor) editor.dispatchEvent(new Event('input'));
        }
    };

    document.getElementById('btnFlipTranslate').onclick = () => {
        const selection = window.getSelection();
        let isInsideTranslate = false; let targetSpan = null;
        if (selection.rangeCount > 0 && editor) {
            let node = selection.anchorNode;
            while(node && node !== editor) {
                if(node.nodeType === 1 && node.classList.contains('has-translate')) { isInsideTranslate = true; targetSpan = node; break; }
                node = node.parentNode;
            }
        }
        if (isInsideTranslate && targetSpan) {
            targetSpan.textContent = (targetSpan.textContent === targetSpan.dataset.en) ? targetSpan.dataset.ms : targetSpan.dataset.en;
        } else if (editor) {
            const allTranslates = editor.querySelectorAll('.has-translate');
            if(allTranslates.length === 0) return;
            const firstOne = allTranslates[0];
            const isCurrentlyEn = (firstOne.textContent === firstOne.dataset.en);
            allTranslates.forEach(span => { span.textContent = isCurrentlyEn ? span.dataset.ms : span.dataset.en; });
        }
        if(editor) editor.dispatchEvent(new Event('input'));
    };

    // --- PEMBAIKAN FUNGSI CARIAN (SEARCH) ---
    const searchFilesInput = document.getElementById('searchFiles');
    if (searchFilesInput) {
        searchFilesInput.addEventListener('input', function() {
            const query = this.value.toLowerCase();
            const list = document.getElementById('listFiles');
            if (list) {
                Array.from(list.children).forEach(el => {
                    const textContent = el.innerText.toLowerCase();
                    el.style.display = textContent.includes(query) ? '' : 'none'; 
                });
            }
        });
    }

    const searchFoldersInput = document.getElementById('searchFolders');
    if (searchFoldersInput) {
        searchFoldersInput.addEventListener('input', function() {
            const query = this.value.toLowerCase();
            const list = document.getElementById('listFolders');
            if (list) {
                Array.from(list.children).forEach(el => {
                    const textContent = el.innerText.toLowerCase();
                    el.style.display = textContent.includes(query) ? '' : 'none';
                });
            }
        });
    }

    // --- UPLOAD GAMBAR DALAM EDITOR ---
    window.handleImageUpload = async function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const loader = document.getElementById('saveLoader');
        const bar = document.getElementById('progressBar');
        const status = document.getElementById('saveStatus');

        if(loader) loader.classList.remove('hidden');
        if(bar) bar.style.width = '30%';
        if(status) status.innerText = 'Memuat naik gambar...';

        try {
            const userId = (state.user && state.user.uid) ? state.user.uid : (state.uid || 'anonymous');
            const fileRef = storage.ref(`uploads/${userId}/${Date.now()}_${file.name}`);
            await fileRef.put(file);
            const url = await fileRef.getDownloadURL();

            if(bar) bar.style.width = '100%';
            if(status) status.innerText = 'Berjaya dimuat naik!';

            restoreSelection();
            let mediaHTML = `&nbsp;<span contenteditable="false" style="display:inline-block; max-width:100%; user-select:all;"><img src="${url}" alt="gambar nota" style="max-width: 100%; border-radius: 8px; margin: 5px 0; border: 1px solid #334155;" /></span>&nbsp;`;
            
            document.execCommand('insertHTML', false, mediaHTML);
            if(editor) editor.focus();
            saveSelection();
            if(editor) editor.dispatchEvent(new Event('input')); 

            setTimeout(() => {
                if(loader) loader.classList.add('hidden');
                if(status) status.innerText = '';
            }, 1500);

        } catch (e) {
            alert("Ralat muat naik gambar.");
            if(loader) loader.classList.add('hidden');
            if(status) status.innerText = 'Gagal';
        }
        event.target.value = ""; 
    };

    // =========================================================================
    // --- KOD LOGIK HALAMAN AUDIO (AUDIO PAGE) ANAK ---
    // =========================================================================
    
    // Rujukan ke Pangkalan Data (Sub-collection audios di bawah nota)
    const audiosRef = () => notesRef(state.currentFileId, state.currentFolderId).doc(state.currentNoteId).collection('audios');

    const btnOpenAudioPage = document.getElementById('btnOpenAudioPage');
    if (btnOpenAudioPage) {
        btnOpenAudioPage.onclick = () => {
            if (!state.currentNoteId) {
                alert("Sila taip sekurang-kurangnya satu huruf dalam nota terlebih dahulu sebelum membuka halaman audio.");
                return;
            }
            showPage('audioPage');
            loadAudios();
        };
    }

    const btnBackToNoteFromAudio = document.getElementById('btnBackToNoteFromAudio');
    if (btnBackToNoteFromAudio) {
        btnBackToNoteFromAudio.onclick = () => {
            showPage('note');
        };
    }

    // Fungsi Papar Audio Bersusun
    async function loadAudios() {
        const snap = await audiosRef().get();
        const list = document.getElementById('listAudioPage');
        if (!list) return;
        list.innerHTML = '';

        let items = [];
        snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));

        // Susunan Teori: Nombor dulu, kemudian Abjad A-Z
        items.sort((a, b) => {
            let titleA = (a.title || "").toLowerCase();
            let titleB = (b.title || "").toLowerCase();
            return titleA.localeCompare(titleB, undefined, { numeric: true, sensitivity: 'base' });
        });

        items.forEach(item => {
            const div = document.createElement('div');
            div.className = "bg-slate-800 p-4 rounded-xl border border-slate-700 flex flex-col gap-3 shadow-lg";
            
            const header = document.createElement('div');
            header.className = "flex justify-between items-center gap-2 border-b border-slate-700 pb-2";
            header.innerHTML = `<span class="font-bold flex-1 text-left text-sm text-emerald-400 break-text">${item.title || 'Audio Fail'}</span>
              <div class="flex gap-2">
                <button class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-xs edit-btn transition" title="Tukar Nama">✏️ Edit</button>
                <button class="px-3 py-1 bg-red-900/40 hover:bg-red-800 text-red-400 rounded text-xs del-btn transition" title="Padam">🗑️ Padam</button>
              </div>`;
            
            header.querySelector('.edit-btn').onclick = async () => {
                const newTitle = prompt('Tukar Nama Audio:', item.title);
                if(newTitle && newTitle.trim() !== "" && newTitle !== item.title) {
                    await audiosRef().doc(item.id).update({title: newTitle.trim()});
                    loadAudios(); // Segarkan senarai
                }
            };
            
            header.querySelector('.del-btn').onclick = async () => {
                if(confirm(`Padam audio "${item.title}" secara kekal?`)) {
                    await audiosRef().doc(item.id).delete();
                    loadAudios();
                }
            };

            const player = document.createElement('audio');
            player.controls = true;
            player.src = item.url;
            player.className = "w-full outline-none h-10";

            div.appendChild(header);
            div.appendChild(player);
            list.appendChild(div);
        });
    }

    // Fungsi Muat Naik Audio Baru
    window.handleAudioPageUpload = async function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const loader = document.getElementById('saveLoaderAudio');
        const bar = document.getElementById('progressBarAudio');
        const status = document.getElementById('audioUploadStatus');

        if(loader) loader.classList.remove('hidden');
        if(bar) bar.style.width = '30%';
        if(status) status.innerText = 'Memuat naik audio... Sila tunggu.';

        try {
            const userId = (state.user && state.user.uid) ? state.user.uid : (state.uid || 'anonymous');
            const fileRef = storage.ref(`uploads/${userId}/${Date.now()}_${file.name}`);
            await fileRef.put(file);
            const url = await fileRef.getDownloadURL();

            if(bar) bar.style.width = '100%';
            if(status) status.innerText = 'Menyimpan ke pangkalan data...';

            let defaultTitle = file.name.split('.').slice(0, -1).join('.') || "Audio Baru";
            
            await audiosRef().add({
                title: defaultTitle,
                url: url,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            if(status) status.innerText = 'Berjaya dimuat naik!';
            loadAudios(); 

            setTimeout(() => {
                if(loader) loader.classList.add('hidden');
                if(status) status.innerText = '';
            }, 2000);

        } catch (e) {
            console.error(e);
            alert("Ralat muat naik audio: Pastikan Firebase Storage Rules anda membenarkan 'write'.");
            if(loader) loader.classList.add('hidden');
            if(status) status.innerText = 'Gagal muat naik';
        }
        event.target.value = ""; 
    };

    // --- MANUAL SEJARAH ---
    document.getElementById('btnManualSave').onclick = async () => {
        const content = editor.innerHTML;
        if(!content || !state.noteId) return alert("Nota kosong.");
        const loader = document.getElementById('saveLoader');
        const bar = document.getElementById('progressBar');
        loader.classList.remove('hidden'); bar.style.width = '0%';
        setTimeout(() => bar.style.width = '60%', 200);

        try {
            const noteDoc = notesRef(state.currentFileId, state.currentFolderId).doc(state.currentNoteId);
            const oldHistory = await noteDoc.collection('history_manual').get();
            const batch = db.batch();
            oldHistory.forEach(doc => batch.delete(doc.ref));
            await batch.commit();

            await noteDoc.collection('history_manual').add({ content, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            
            bar.style.width = '100%';
            setTimeout(() => {
                loader.classList.add('hidden');
                const s = document.getElementById('saveStatus');
                s.textContent = 'Sejarah Diperbaharui!';
                setTimeout(() => s.textContent = '', 2000);
            }, 800);
        } catch (e) { loader.classList.add('hidden'); alert('Gagal simpan.'); }
    };

    async function toggleHistory(show) {
        const modal = document.getElementById('modalHistory');
        if (!show) return modal.classList.add('hidden');
        modal.classList.remove('hidden');
        const list = document.getElementById('historyList');
        list.innerHTML = '<p class="text-xs animate-pulse">Menarik data...</p>';

        const snap = await notesRef(state.currentFileId, state.currentFolderId).doc(state.currentNoteId).collection('history_manual').orderBy('timestamp', 'desc').limit(1).get();

        list.innerHTML = '';
        if(snap.empty) return list.innerHTML = '<p class="text-xs opacity-50 p-10">Tiada sejarah manual disimpan.</p>';

        snap.forEach(doc => {
            const d = doc.data();
            const btn = document.createElement('button');
            btn.className = `w-full p-4 rounded-xl border border-indigo-900 bg-indigo-900/10 text-left`;
            btn.innerHTML = `<span class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest">Snapshot Terakhir</span><br><span class="text-xs">${d.timestamp?.toDate().toLocaleString() || 'Baru'}</span>`;
            btn.onclick = () => { if(confirm(`Pulihkan versi ini?`)) { editor.innerHTML = d.content; modal.classList.add('hidden'); editor.dispatchEvent(new Event('input')); }};
            list.appendChild(btn);
        });
    }

    // --- OTHER UI BINDINGS ---
    const btnHistory = document.getElementById('btnHistory');
    if(btnHistory) btnHistory.onclick = () => toggleHistory(true);
    
    const btnBackToFolders = document.getElementById('btnBackToFolders');
    if(btnBackToFolders) btnBackToFolders.onclick = () => showPage('folders');

    const btnAddFile = document.getElementById('btnAddFile');
    if(btnAddFile) btnAddFile.onclick = async () => { const t = prompt('Nama Fail Baru?'); if(t) { await filesRef().add({ title: t, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); loadFiles(); }};
    
    const btnAddFolder = document.getElementById('btnAddFolder');
    if(btnAddFolder) btnAddFolder.onclick = async () => { const t = prompt('Nama Folder Baru?'); if(t) { await foldersRef(state.currentFileId).add({ title: t, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); loadFolders(); }};

  </script>
  <script>
    if ("serviceWorker" in navigator) { navigator.serviceWorker.register("service-worker.js"); }
  </script>
</body>
