<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Original Wan-Law</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            slate: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' }
          }
        }
      }
    }
  </script>

  <style>
    /* Sembunyikan scrollbar tapi fungsi tetap ada */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Editor Placeholder */
    .editor-container [contenteditable]:empty:before {
      content: attr(placeholder);
      color: #64748b;
    }
  </style>
</head>
<body class="min-h-screen bg-[#0f172a] text-white font-sans">

  <header class="flex items-center justify-between px-6 py-4 border-b border-slate-800 bg-[#0f172a]/95 backdrop-blur sticky top-0 z-50">
    <h1 class="text-xl font-bold tracking-wide">Original Wan-Law</h1>
    <button id="btn-logout" class="hidden px-4 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-sm border border-slate-700 transition-all">
      Log keluar
    </button>
  </header>

  <main class="max-w-4xl mx-auto p-4 md:p-6">

    <section id="view-login" class="mt-20 flex justify-center">
      <div class="w-full max-w-md bg-slate-800/50 p-8 rounded-2xl border border-slate-700 shadow-2xl">
        <h2 class="text-xl font-bold mb-2">Masuk akaun</h2>
        <p class="text-slate-400 mb-6 text-sm">Gunakan Google untuk akses nota skrip & undang-undang anda.</p>
        <button id="btn-google" class="w-full py-3 rounded-xl bg-slate-700 hover:bg-slate-600 font-bold border border-slate-600 transition-all">
          Log masuk dengan Google
        </button>
      </div>
    </section>

    <section id="view-home" class="hidden space-y-6">
      <div class="flex gap-2">
        <input id="search-files" type="text" placeholder="Cari fail..." class="flex-1 px-4 py-2.5 rounded-xl bg-slate-800 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-600" />
        <button id="btn-add-file" class="px-5 py-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 border border-slate-700 font-bold transition-all text-sm">
          + Fail
        </button>
      </div>
      <div id="files-list" class="grid gap-4"></div>
    </section>

    <section id="view-folders" class="hidden space-y-6">
      <div class="flex items-center justify-between gap-4">
        <button id="btn-back-home" class="px-4 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 text-sm border border-slate-700">← Kembali</button>
        <h2 id="current-file-name" class="flex-1 text-right font-bold text-blue-400 truncate"></h2>
      </div>
      <div class="flex gap-2">
        <input id="search-folders" type="text" placeholder="Cari folder..." class="flex-1 px-4 py-2.5 rounded-xl bg-slate-800 border border-slate-700 focus:outline-none" />
        <button id="btn-add-folder" class="px-5 py-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 border border-slate-700 font-bold text-sm">
          + Folder
        </button>
      </div>
      <div id="folders-list" class="grid gap-4"></div>
    </section>

    <section id="view-note" class="hidden space-y-4">
      <div class="flex items-center justify-between gap-4 sticky top-[73px] bg-[#0f172a] py-2 z-40">
        <button id="btn-back-folders" class="px-4 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 text-sm border border-slate-700">← Kembali</button>
        <h2 id="current-folder-name" class="flex-1 text-right font-bold text-blue-400 truncate"></h2>
      </div>

      <div class="flex flex-wrap items-center gap-2 p-2 bg-slate-800/50 rounded-2xl border border-slate-700">
        <button data-action="bold" class="w-10 h-10 rounded-lg hover:bg-slate-700 font-bold">B</button>
        <button data-action="underline" class="w-10 h-10 rounded-lg hover:bg-slate-700 underline">U</button>
        <input id="color-picker" type="color" class="w-8 h-8 bg-transparent border-none cursor-pointer" />
        <div class="h-6 w-px bg-slate-700"></div>
        <button id="btn-size-down" class="w-10 h-10 rounded-lg hover:bg-slate-700">−</button>
        <button id="btn-size-up" class="w-10 h-10 rounded-lg hover:bg-slate-700">+</button>
        <button id="btn-export-json" class="ml-auto px-3 py-1.5 text-[10px] uppercase font-bold rounded-lg bg-slate-700 hover:bg-slate-600">Export</button>
      </div>

      <div id="editor" class="editor-container min-h-[450px] p-6 rounded-2xl bg-slate-800/20 border border-slate-800 focus:outline-none text-slate-200 leading-relaxed shadow-inner" contenteditable="true" placeholder="Tulis nota anda di sini..."></div>
      
      <p id="save-status" class="text-[10px] uppercase tracking-widest text-slate-500 font-bold text-center">Auto-simpan aktif</p>

      <div class="mt-10 p-5 rounded-2xl bg-slate-800/10 border border-slate-800">
        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Sejarah (5 Terakhir)</h3>
        <div id="history-list" class="space-y-2"></div>
      </div>
    </section>

  </main>

  <footer class="py-10 text-center text-[10px] text-slate-600 uppercase tracking-[0.2em]">Very Good Job!</footer>

  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script defer src="app.js"></script>
</body>
</html>
