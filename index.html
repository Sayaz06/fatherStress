<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wan-Law UI Hybrid</title>

  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    :root { --bg: #020617; }
    body { background-color: var(--bg); color: #e5e7eb; }
    .editor {
      min-height: 500px;
      background: #0b1220;
      border: 1px solid #1f2937;
      border-radius: 0 0 12px 12px;
      padding: 20px;
      outline: none;
      color: white;
      font-size: 16px;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body class="min-h-screen">

  <header class="flex items-center justify-between px-4 py-3 border-b border-slate-800 bg-slate-900/50 sticky top-0 z-50 backdrop-blur-md">
    <h1 class="text-xl font-bold text-indigo-400">Wan-Law <span class="text-white text-sm font-normal">v2 Style</span></h1>
    <button id="btnLogout" class="hidden px-3 py-1 rounded bg-slate-800 hover:bg-red-900 text-xs transition">Logout</button>
  </header>

  <main class="max-w-4xl mx-auto p-4">

    <section id="view-login" class="mt-20 flex justify-center">
      <div class="max-w-md w-full bg-slate-800/50 rounded-2xl p-8 border border-slate-700 text-center">
        <h2 class="text-2xl font-bold mb-6">Masuk Akaun</h2>
        <button id="btnGoogle" class="w-full py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-bold transition">
          Log masuk dengan Google
        </button>
      </div>
    </section>

    <section id="view-home" class="hidden">
      <div class="flex gap-2 mb-6">
        <input id="searchFiles" type="text" placeholder="Cari fail lama..." class="flex-1 px-4 py-2 rounded-xl bg-slate-800 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        <button id="btnAddFile" class="px-4 py-2 rounded-xl bg-indigo-600 font-bold text-sm">Tambah Fail</button>
      </div>
      <div id="listFiles" class="grid gap-2"></div>
    </section>

    <section id="view-folders" class="hidden">
      <div class="flex items-center justify-between mb-4">
        <button onclick="showView('home')" class="text-sm text-slate-400 hover:text-white">← Kembali</button>
        <h3 id="labelFile" class="font-bold text-indigo-400"></h3>
      </div>
      <div class="flex gap-2 mb-6">
        <input id="searchFolders" type="text" placeholder="Cari folder..." class="flex-1 px-4 py-2 rounded-xl bg-slate-800 border border-slate-700 focus:outline-none" />
        <button id="btnAddFolder" class="px-4 py-2 rounded-xl bg-indigo-600 font-bold text-sm">Tambah Folder</button>
      </div>
      <div id="listFolders" class="grid gap-2"></div>
    </section>

    <section id="view-note" class="hidden">
      <div class="flex items-center justify-between mb-4">
        <button id="btnBackToFolders" class="px-3 py-1 rounded bg-slate-800 text-xs font-semibold">← Simpan & Kembali</button>
        <div class="text-right">
          <h3 id="labelFolder" class="font-bold text-indigo-400 text-sm"></h3>
          <p id="saveStatus" class="text-[10px] text-slate-500">Auto-simpan: Aktif</p>
        </div>
      </div>

      <div class="flex flex-wrap gap-2 p-2 bg-slate-800 rounded-t-xl border-x border-t border-slate-700">
        <button class="w-8 h-8 flex items-center justify-center bg-slate-700 rounded hover:bg-slate-600 font-bold" onclick="doCmd('bold')">B</button>
        <button class="w-8 h-8 flex items-center justify-center bg-slate-700 rounded hover:bg-slate-600 underline font-bold" onclick="doCmd('underline')">U</button>
        <input type="color" oninput="doCmd('foreColor', this.value)" class="w-8 h-8 bg-transparent border-none cursor-pointer" />
        <div class="h-8 w-[1px] bg-slate-700 mx-1"></div>
        <button class="px-2 h-8 bg-slate-700 rounded text-xs font-bold" onclick="adjustSize(2)">A+</button>
        <button class="px-2 h-8 bg-slate-700 rounded text-xs font-bold" onclick="adjustSize(-2)">A-</button>
      </div>

      <div id="editor" class="editor" contenteditable="true" spellcheck="false"></div>
    </section>

  </main>

  <script>
    // FIREBASE CONFIG (SAMA SEPERTI APP PERTAMA ANDA)
    const firebaseConfig = {
      apiKey: "AIzaSyCtxOE42D07yFc9eK3nLMsOy50SmeSErwI",
      authDomain: "fatherstress-9e695.firebaseapp.com",
      projectId: "fatherstress-9e695",
      storageBucket: "fatherstress-9e695.firebasestorage.app",
      messagingSenderId: "147729735248",
      appId: "1:147729735248:web:f6771fee76727436a0fb55"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let state = {
      uid: null,
      fileId: null,
      folderId: null,
      noteId: null,
      saveTimer: null
    };

    // PATH HELPER (Guna Struktur App 1)
    const getFilesCol = () => db.collection('users').doc(state.uid).collection('files');
    const getFoldersCol = (fId) => getFilesCol().doc(fId).collection('folders');
    const getNotesCol = (fId, foId) => getFoldersCol(fId).doc(foId).collection('notes');

    // VIEW ROUTING
    function showView(id) {
      document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
      document.getElementById('view-' + id).classList.remove('hidden');
    }

    auth.onAuthStateChanged(user => {
      if (user) {
        state.uid = user.uid;
        document.getElementById('btnLogout').classList.remove('hidden');
        showView('home');
        loadFiles();
      } else {
        showView('login');
        document.getElementById('btnLogout').classList.add('hidden');
      }
    });

    document.getElementById('btnGoogle').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    document.getElementById('btnLogout').onclick = () => auth.signOut();

    // 1. FILES (Dahulu Subjek)
    async function loadFiles() {
      const snap = await getFilesCol().orderBy('createdAt', 'asc').get();
      const list = document.getElementById('listFiles');
      list.innerHTML = '';
      snap.forEach(doc => {
        const d = doc.data();
        const div = document.createElement('div');
        div.className = "bg-slate-800/80 p-4 rounded-xl border border-slate-700 flex justify-between items-center";
        div.innerHTML = `<button class="font-bold flex-1 text-left">${d.title || 'Tanpa Nama'}</button>
                         <button class="text-xs text-red-500 ml-4 opacity-50 hover:opacity-100">Padam</button>`;
        div.querySelector('button').onclick = () => openFile(doc.id, d.title);
        div.querySelector('button:last-child').onclick = () => deleteData('files', doc.id, loadFiles);
        list.appendChild(div);
      });
    }

    function openFile(id, title) {
      state.fileId = id;
      document.getElementById('labelFile').textContent = title;
      showView('folders');
      loadFolders();
    }

    // 2. FOLDERS (Dahulu Topik)
    async function loadFolders() {
      const snap = await getFoldersCol(state.fileId).orderBy('createdAt', 'asc').get();
      const list = document.getElementById('listFolders');
      list.innerHTML = '';
      snap.forEach(doc => {
        const d = doc.data();
        const div = document.createElement('div');
        div.className = "bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-center";
        div.innerHTML = `<button class="font-bold flex-1 text-left">${d.title || 'Folder'}</button>
                         <button class="text-xs text-red-500 ml-4 opacity-50 hover:opacity-100">Padam</button>`;
        div.querySelector('button').onclick = () => openNote(doc.id, d.title);
        div.querySelector('button:last-child').onclick = () => deleteData(`files/${state.fileId}/folders`, doc.id, loadFolders);
        list.appendChild(div);
      });
    }

    // 3. NOTE / EDITOR
    async function openNote(id, title) {
      state.folderId = id;
      document.getElementById('labelFolder').textContent = title;
      const editor = document.getElementById('editor');
      editor.innerHTML = 'Memuatkan nota...';
      showView('note');

      const notesRef = getNotesCol(state.fileId, id);
      const snap = await notesRef.limit(1).get();
      
      if (snap.empty) {
        const newNote = await notesRef.add({ content: '', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        state.noteId = newNote.id;
        editor.innerHTML = '';
      } else {
        state.noteId = snap.docs[0].id;
        editor.innerHTML = snap.docs[0].data().content || '';
      }
    }

    // Editor Functions (App 1)
    function doCmd(cmd, val = null) {
      document.execCommand(cmd, false, val);
      document.getElementById('editor').focus();
    }

    function adjustSize(delta) {
      const node = window.getSelection().anchorNode.parentElement;
      const current = parseFloat(window.getComputedStyle(node).fontSize) || 16;
      node.style.fontSize = (current + delta) + 'px';
    }

    // Auto-Save (5 saat)
    document.getElementById('editor').addEventListener('input', () => {
      document.getElementById('saveStatus').textContent = 'Menyimpan...';
      clearTimeout(state.saveTimer);
      state.saveTimer = setTimeout(async () => {
        await getNotesCol(state.fileId, state.folderId).doc(state.noteId).set({
          content: document.getElementById('editor').innerHTML,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        document.getElementById('saveStatus').textContent = 'Disimpan (Awan)';
      }, 5000);
    });

    document.getElementById('btnBackToFolders').onclick = () => showView('folders');

    // Add & Delete Utils
    document.getElementById('btnAddFile').onclick = async () => {
      const title = prompt('Nama Fail Baru?');
      if (title) {
        await getFilesCol().add({ title, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        loadFiles();
      }
    };

    document.getElementById('btnAddFolder').onclick = async () => {
      const title = prompt('Nama Folder Baru?');
      if (title) {
        await getFoldersCol(state.fileId).add({ title, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        loadFolders();
      }
    };

    async function deleteData(path, id, cb) {
      if(confirm('Padam data ini?')) {
        await getFilesCol().parent.doc(state.uid).collection(path).doc(id).delete();
        cb();
      }
    }
  </script>
</body>
</html>
