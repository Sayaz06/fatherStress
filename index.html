<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Wan-Law v4 Fast</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    :root { --bg: #020617; }
    body { background-color: var(--bg); color: #e5e7eb; font-family: system-ui, sans-serif; overflow-x: hidden; }
    .editor {
      min-height: 500px; background: #0b1220; border: 1px solid #1f2937;
      border-radius: 0 0 12px 12px; padding: 16px; outline: none; color: white;
      font-size: 16px; line-height: 1.6; word-break: break-word;
    }
    .hidden { display: none !important; }
    .break-text { word-break: break-word; overflow-wrap: break-word; white-space: normal; }
  </style>
</head>
<body class="min-h-screen w-full">

  <header class="w-full flex items-center justify-between px-4 py-3 border-b border-slate-800 bg-slate-900/80 sticky top-0 z-50">
    <h1 class="text-lg font-bold text-indigo-400">Wan-Law <span class="text-white text-xs font-normal">v4 Fast</span></h1>
    <button id="btnLogout" class="hidden px-2 py-1 rounded bg-red-900/20 text-red-400 text-[10px] border border-red-900/50">Logout</button>
  </header>

  <main class="w-full max-w-4xl mx-auto p-4">
    <section id="view-login" class="mt-20 flex justify-center px-4">
      <div class="w-full max-w-md bg-slate-800/50 rounded-2xl p-6 border border-slate-700 text-center shadow-xl">
        <button id="btnGoogle" class="w-full py-4 rounded-xl bg-indigo-600 font-bold transition">Log masuk Google</button>
      </div>
    </section>

    <section id="view-home" class="hidden">
      <div class="flex gap-2 mb-6">
        <input id="searchFiles" type="text" placeholder="Cari fail..." class="flex-1 px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-sm focus:outline-none" />
        <button id="btnAddFile" class="px-6 py-3 rounded-xl bg-indigo-600 font-bold text-sm">Tambah</button>
      </div>
      <div id="listFiles" class="grid gap-3 w-full"></div>
    </section>

    <section id="view-folders" class="hidden">
      <div class="flex items-center justify-between mb-4 gap-2">
        <button onclick="showView('home')" class="text-xs text-slate-400 bg-slate-800 px-3 py-1 rounded">←</button>
        <h3 id="labelFile" class="font-bold text-indigo-400 text-sm truncate"></h3>
      </div>
      <div class="flex gap-2 mb-6">
        <input id="searchFolders" type="text" placeholder="Cari folder..." class="flex-1 px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-sm focus:outline-none" />
        <button id="btnAddFolder" class="px-6 py-3 rounded-xl bg-indigo-600 font-bold text-sm">Tambah</button>
      </div>
      <div id="listFolders" class="grid gap-3 w-full"></div>
    </section>

    <section id="view-note" class="hidden">
      <div class="flex items-center justify-between mb-3 gap-2">
        <button id="btnBackToFolders" class="px-3 py-1.5 rounded bg-slate-800 text-[10px] font-bold">← KEMBALI</button>
        <div class="text-right">
          <h3 id="labelFolder" class="font-bold text-indigo-400 text-xs truncate"></h3>
          <p id="saveStatus" class="text-[9px] text-slate-500 h-3"></p>
        </div>
      </div>

      <div class="flex flex-wrap items-center gap-1.5 p-2 bg-slate-800 rounded-t-xl border-x border-t border-slate-700">
        <button class="w-9 h-9 flex items-center justify-center bg-slate-700 rounded font-bold" onclick="doCmd('bold')">B</button>
        <button class="w-9 h-9 flex items-center justify-center bg-slate-700 rounded underline font-bold" onclick="doCmd('underline')">U</button>
        <input type="color" oninput="doCmd('foreColor', this.value)" class="w-9 h-9 bg-transparent cursor-pointer" />
        <button id="btnHistory" class="ml-auto px-3 h-9 bg-amber-600/20 text-amber-400 text-[10px] rounded border border-amber-900/50 font-bold">🕒 SEJARAH</button>
      </div>
      <div id="editor" class="editor" contenteditable="true" spellcheck="false"></div>
      
      <div id="modalHistory" class="fixed inset-0 bg-black/90 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl">
          <div class="p-4 border-b border-slate-800 flex justify-between bg-slate-800/50">
            <h4 class="font-bold text-sm">PULIHKAN VERSI</h4>
            <button onclick="toggleHistory(false)" class="text-slate-400 px-2">&times;</button>
          </div>
          <div id="historyList" class="p-4 flex flex-col gap-3"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCtxOE42D07yFc9eK3nLMsOy50SmeSErwI",
      authDomain: "fatherstress-9e695.firebaseapp.com",
      projectId: "fatherstress-9e695",
      storageBucket: "fatherstress-9e695.firebasestorage.app",
      messagingSenderId: "147729735248",
      appId: "1:147729735248:web:f6771fee76727436a0fb55"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let state = { uid: null, fileId: null, folderId: null, noteId: null, saveTimer: null, statusTimer: null };

    function showView(id) {
      document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
      document.getElementById('view-' + id).classList.remove('hidden');
    }

    auth.onAuthStateChanged(user => {
      if (user) { state.uid = user.uid; document.getElementById('btnLogout').classList.remove('hidden'); showView('home'); loadFiles(); }
      else { showView('login'); document.getElementById('btnLogout').classList.add('hidden'); }
    });

    document.getElementById('btnGoogle').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    document.getElementById('btnLogout').onclick = () => auth.signOut();

    // --- CRUD ---
    async function loadFiles() {
      const snap = await db.collection('users').doc(state.uid).collection('files').orderBy('createdAt', 'desc').get();
      const list = document.getElementById('listFiles'); list.innerHTML = '';
      snap.forEach(doc => {
        const d = doc.data();
        const div = document.createElement('div');
        div.className = "bg-slate-800/60 p-4 rounded-xl border border-slate-700 flex justify-between items-center";
        div.innerHTML = `<button class="font-bold flex-1 text-left text-sm break-text">${d.title || 'Fail'}</button>
          <div class="flex gap-2"><button class="p-2 bg-slate-700 rounded text-xs edit-btn">✏️</button><button class="p-2 bg-red-900/20 text-red-500 rounded text-xs del-btn">🗑️</button></div>`;
        div.querySelector('button').onclick = () => { state.fileId = doc.id; document.getElementById('labelFile').textContent = d.title; showView('folders'); loadFolders(); };
        div.querySelector('.edit-btn').onclick = () => editTitle('files', doc.id, d.title, loadFiles);
        div.querySelector('.del-btn').onclick = () => deleteItem('files', doc.id, loadFiles);
        list.appendChild(div);
      });
    }

    async function loadFolders() {
      const snap = await db.collection('users').doc(state.uid).collection('files').doc(state.fileId).collection('folders').orderBy('createdAt', 'desc').get();
      const list = document.getElementById('listFolders'); list.innerHTML = '';
      snap.forEach(doc => {
        const d = doc.data();
        const div = document.createElement('div');
        div.className = "bg-slate-800/60 p-4 rounded-xl border border-slate-700 flex justify-between items-center";
        div.innerHTML = `<button class="font-bold flex-1 text-left text-sm break-text">${d.title || 'Folder'}</button>
          <div class="flex gap-2"><button class="p-2 bg-slate-700 rounded text-xs edit-btn">✏️</button><button class="p-2 bg-red-900/20 text-red-500 rounded text-xs del-btn">🗑️</button></div>`;
        div.querySelector('button').onclick = () => openNote(doc.id, d.title);
        div.querySelector('.edit-btn').onclick = () => editTitle(`files/${state.fileId}/folders`, doc.id, d.title, loadFolders);
        div.querySelector('.del-btn').onclick = () => deleteItem(`files/${state.fileId}/folders`, doc.id, loadFolders);
        list.appendChild(div);
      });
    }

    async function openNote(id, title) {
      state.folderId = id; document.getElementById('labelFolder').textContent = title;
      const editor = document.getElementById('editor'); editor.innerHTML = 'Memuatkan...';
      showView('note');
      const noteRef = db.collection('users').doc(state.uid).collection('files').doc(state.fileId).collection('folders').doc(id).collection('notes');
      const snap = await noteRef.limit(1).get();
      if (snap.empty) {
        const n = await noteRef.add({ content: '', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        state.noteId = n.id; editor.innerHTML = '';
      } else {
        state.noteId = snap.docs[0].id; editor.innerHTML = snap.docs[0].data().content || '';
      }
    }

    // --- SAVING & HISTORY LOGIC ---
    document.getElementById('editor').oninput = () => {
      const status = document.getElementById('saveStatus');
      status.textContent = 'Menaip...';
      clearTimeout(state.statusTimer);
      state.statusTimer = setTimeout(() => { status.textContent = ''; }, 2000);

      clearTimeout(state.saveTimer);
      state.saveTimer = setTimeout(async () => {
        const content = document.getElementById('editor').innerHTML;
        const noteDoc = db.collection('users').doc(state.uid).collection('files').doc(state.fileId).collection('folders').doc(state.folderId).collection('notes').doc(state.noteId);
        
        await noteDoc.update({ content, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        
        const histRef = noteDoc.collection('history');
        
        // Versi Real-time (Limit 5)
        await histRef.add({ content, timestamp: firebase.firestore.FieldValue.serverTimestamp(), type: 'realtime' });
        const rtDocs = await histRef.where('type', '==', 'realtime').orderBy('timestamp', 'desc').get();
        if(rtDocs.size > 5) rtDocs.docs.slice(5).forEach(d => d.ref.delete());

        // Versi Semalam (Hanya update jika > 24 jam)
        const dailySnap = await histRef.where('type', '==', 'daily').orderBy('timestamp', 'desc').limit(1).get();
        const now = new Date().getTime();
        if(dailySnap.empty || (now - dailySnap.docs[0].data().timestamp.toDate().getTime() > 86400000)) {
          await histRef.add({ content, timestamp: firebase.firestore.FieldValue.serverTimestamp(), type: 'daily' });
          const dyDocs = await histRef.where('type', '==', 'daily').orderBy('timestamp', 'desc').get();
          if(dyDocs.size > 1) dyDocs.docs.slice(1).forEach(d => d.ref.delete());
        }

        status.textContent = 'Tersimpan';
        setTimeout(() => { if(status.textContent === 'Tersimpan') status.textContent = ''; }, 2000);
      }, 3000);
    };

    async function toggleHistory(show) {
      const modal = document.getElementById('modalHistory');
      if (!show) return modal.classList.add('hidden');
      modal.classList.remove('hidden');
      const list = document.getElementById('historyList');
      list.innerHTML = '<p class="text-xs text-center animate-pulse">Memuatkan...</p>';

      const noteDoc = db.collection('users').doc(state.uid).collection('files').doc(state.fileId).collection('folders').doc(state.folderId).collection('notes').doc(state.noteId);
      const histRef = noteDoc.collection('history');

      const rtSnap = await histRef.where('type', '==', 'realtime').orderBy('timestamp', 'desc').limit(1).get();
      const dySnap = await histRef.where('type', '==', 'daily').orderBy('timestamp', 'desc').limit(1).get();

      list.innerHTML = '';
      const renderBtn = (snap, label, col) => {
        if(snap.empty) return;
        const d = snap.docs[0].data();
        const btn = document.createElement('button');
        btn.className = `w-full p-4 rounded-xl border border-${col}-900 bg-${col}-900/10 text-left`;
        btn.innerHTML = `<span class="text-[10px] font-bold text-${col}-400 uppercase">${label}</span><br><span class="text-xs">${d.timestamp.toDate().toLocaleString()}</span>`;
        btn.onclick = () => { if(confirm(`Pulihkan ${label}?`)) { document.getElementById('editor').innerHTML = d.content; modal.classList.add('hidden'); }};
        list.appendChild(btn);
      }
      renderBtn(rtSnap, "Versi Tadi (Real-time)", "blue");
      renderBtn(dySnap, "Versi Semalam (24 Jam)", "emerald");
      if(list.innerHTML === '') list.innerHTML = '<p class="text-center text-xs opacity-50">Tiada sejarah.</p>';
    }

    // --- UTILS ---
    document.getElementById('btnHistory').onclick = () => toggleHistory(true);
    document.getElementById('btnBackToFolders').onclick = () => showView('folders');
    async function editTitle(p,id,o,cb){ const n = prompt('Tukar:',o); if(n && n!==o){ await db.collection('users').doc(state.uid).collection(p).doc(id).update({title:n}); cb(); } }
    async function deleteItem(p,id,cb){ if(confirm('Padam?')){ await db.collection('users').doc(state.uid).collection(p).doc(id).delete(); cb(); } }
    document.getElementById('btnAddFile').onclick = async () => { const t = prompt('Fail Baru?'); if(t) { await db.collection('users').doc(state.uid).collection('files').add({ title: t, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); loadFiles(); }};
    document.getElementById('btnAddFolder').onclick = async () => { const t = prompt('Folder Baru?'); if(t) { await db.collection('users').doc(state.uid).collection('files').doc(state.fileId).collection('folders').add({ title: t, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); loadFolders(); }};
    function doCmd(c,v=null){ document.execCommand(c,false,v); document.getElementById('editor').focus(); }
  </script>
</body>
</html>
